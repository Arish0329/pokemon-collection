  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07070f;
    --bg-card:   #0d0d1e;
    --bg-panel:  #0f0f1a;
    --border:    #1e1e2e;
    --border-hi: #2a2a3e;
    --text:      #d8d8ea;
    --text-muted:#9090b0;
    --text-dim:  #5a5a7a;
    --accent:    #4e9eff;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Nav Bar ── */
  .nav {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,7,15,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 12px 6px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .nav-back:hover { color: var(--text); border-color: var(--border); background: rgba(255,255,255,0.04); }
  .nav-back-arrow { font-size: 0.9rem; }
  .nav-brand {
    margin-left: 16px;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .nav-brand span { color: var(--accent); }

  /* ── Hero Header ── */
  .header {
    text-align: center;
    padding: 48px 20px 36px;
    background: linear-gradient(180deg, #0a0a22 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: --glow-color 0.4s;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 55% at 50% 0%, var(--header-glow, rgba(78,158,255,0.09)) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.5s;
  }
  .header-eyebrow {
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.2em;
    line-height: 1;
    margin-bottom: 4px;
    transition: color 0.3s;
  }
  .header-title {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.04em;
    text-shadow: 0 0 40px var(--header-glow, rgba(78,158,255,0.22));
    transition: text-shadow 0.3s;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 0.82rem;
    color: #9090b0;
    letter-spacing: 0.1em;
  }
  .header-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .h-badge {
    font-size: 0.72rem;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ── Pokémon Selector ── */
  .poke-selector {
    display: flex;
    gap: 12px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    justify-content: center;
    flex-wrap: wrap;
  }
  .poke-tab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--bg-panel);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    min-width: 160px;
  }
  .poke-tab:hover {
    border-color: var(--border-hi);
    background: var(--bg-card);
    transform: translateY(-2px);
  }
  .poke-tab.active {
    border-color: var(--tab-accent, #4e9eff);
    background: var(--bg-card);
    box-shadow: 0 0 20px var(--tab-glow, rgba(78,158,255,0.15));
  }
  .poke-tab-icon {
    width: 48px;
    height: 48px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px var(--tab-glow, transparent));
    transition: transform 0.2s;
  }
  .poke-tab:hover .poke-tab-icon { transform: scale(1.1); }
  .poke-tab-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .poke-tab-zh {
    font-size: 0.9rem;
    font-weight: 900;
    color: #fff;
  }
  .poke-tab.active .poke-tab-zh { color: var(--tab-accent, #4e9eff); }
  .poke-tab-en {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .poke-tab-count {
    margin-left: auto;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  .poke-tab.active .poke-tab-count {
    color: var(--tab-accent);
    border-color: var(--tab-accent);
    background: rgba(0,0,0,0.2);
  }

  /* ── Page Body ── */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px 64px;
  }

  /* ── Empty State ── */
  .empty-state {
    display: none;
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
  .empty-state p { font-size: 0.8rem; }

  /* ── Section Title ── */
  .section-title {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    margin-top: 8px;
    font-weight: 700;
  }

  /* ── Chart Panel ── */
  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .custom-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-hi);
    background: #13131f;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
    font-size: 12px;
    color: #888;
  }
  .legend-item.active { border-color: rgba(78,158,255,0.4); color: #ccc; }
  .legend-item.active .legend-check { opacity: 1; }
  .legend-item:not(.active) { opacity: 0.35; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--c); flex-shrink: 0; }
  .legend-check { font-size: 11px; color: var(--c); opacity: 0; transition: opacity 0.15s; }
  .chart-container { position: relative; height: 380px; }
  canvas { display: block; }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .stat-card:hover { border-color: var(--border-hi); }
  .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
  .stat-main { display: flex; flex-direction: column; gap: 2px; }
  .stat-main-tag { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .stat-value { font-size: 1.5rem; font-weight: 900; line-height: 1.1; }
  .stat-divider { height: 1px; background: var(--border); }
  .stat-range { display: flex; gap: 12px; }
  .stat-range-item { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .stat-range-tag { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  .stat-range-val { font-size: 0.82rem; font-weight: 700; color: var(--text); }

  /* ── Records Table ── */
  .table-wrap {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th {
    background: #13131f;
    color: var(--text-dim);
    font-weight: 700;
    padding: 10px 16px;
    text-align: left;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 16px; border-bottom: 1px solid #0d0d1a; color: var(--text-muted); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #13131f; }
  .psa-badge { display: inline-block; border-radius: 4px; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; }

  /* ── Sort Bar ── */
  .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .sort-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }
  .sort-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .sort-btn:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.03); }
  .sort-btn.active { color: var(--accent); border-color: rgba(78,158,255,0.5); background: rgba(78,158,255,0.08); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeUp 0.4s ease both; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page { padding: 24px 16px 48px; }
    th, td { padding: 8px 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .poke-tab { min-width: 130px; padding: 10px 14px; }
  }
</style>
</head>

// ── Grade color scheme (warm gold → deep blue) ──
const grades = [10, 9, 8.5, 8, 7, 6];
const colors = {
  10:  { line: '#f5f0c0', fill: 'rgba(245,240,192,0.07)' },  // 白金 / GEM MINT
  9:   { line: '#c9a227', fill: 'rgba(201,162,39,0.07)' },   // 暖金
  8.5: { line: '#e07030', fill: 'rgba(224,112,48,0.07)' },   // 琥珀橙
  8:   { line: '#88c4f8', fill: 'rgba(136,196,248,0.07)' },  // 淺天藍
  7:   { line: '#4e80e0', fill: 'rgba(78,128,224,0.07)' },   // 中藍
  6:   { line: '#3458b8', fill: 'rgba(52,88,184,0.07)' },    // 深藍
};

// ── State ──
let currentPokeKey = 'charizard';
let currentSort    = 'date-desc';
let chartInstance  = null;

// ══════════════════════════════════════════════
// ── Build Pokémon Selector ──
// ══════════════════════════════════════════════
const selectorEl = document.getElementById('pokeSelector');
Object.entries(pokemonDB).forEach(([key, poke]) => {
  const count = poke.records.length;
  const btn = document.createElement('button');
  btn.className = 'poke-tab' + (key === 'charizard' ? ' active' : '');
  btn.dataset.poke = key;
  btn.style.setProperty('--tab-accent', poke.accent);
  btn.style.setProperty('--tab-glow', poke.glow);
  btn.innerHTML = `
    <img class="poke-tab-icon" src="${poke.icon}" alt="${poke.zh}">
    <div class="poke-tab-info">
      <span class="poke-tab-zh">${poke.zh}</span>
      <span class="poke-tab-en">${poke.en}</span>
    </div>
    <span class="poke-tab-count" id="count-${key}">${count > 0 ? count + ' 筆' : '尚無資料'}</span>
  `;
  btn.addEventListener('click', () => switchPokemon(key));
  selectorEl.appendChild(btn);
});

// ══════════════════════════════════════════════
// ── Chart Init ──
// ══════════════════════════════════════════════
function buildDatasets(records) {
  const sorted = [...records].sort((a,b) => new Date(a.date) - new Date(b.date));
  return grades.map(g => {
    const points = sorted.filter(r => r.psa === g).map(r => ({
      x: new Date(r.date.replace(/\//g, '-')),
      y: r.usd,
      _record: r
    }));
    return {
      label: `PSA ${g}`,
      data: points,
      borderColor: colors[g].line,
      backgroundColor: colors[g].fill,
      pointBackgroundColor: colors[g].line,
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
      tension: 0.3,
      fill: false,
      spanGaps: true,
    };
  }).filter(d => d.data.length > 0);
}

chartInstance = new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: { datasets: buildDatasets(pokemonDB.charizard.records) },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'nearest', intersect: true },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#13131f',
        borderColor: '#2a2a3e',
        borderWidth: 1,
        titleColor: '#888',
        bodyColor: '#eee',
        padding: 10,
        callbacks: {
          title: ctx => {
            if (!ctx.length) return '';
            return ctx[0].raw.x.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
          },
          label: ctx => {
            const r = ctx.raw._record;
            if (!r) return ` ${ctx.dataset.label}  $${ctx.parsed.y.toLocaleString()} USD`;
            return [
              ` ${ctx.dataset.label}`,
              ` $${r.usd.toLocaleString()} USD  ·  NT$${r.twd.toLocaleString()}`,
              ` ${r.source}`,
            ];
          }
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'month', displayFormats: { month: 'yyyy/MM' } },
        grid: { color: '#1a1a28' },
        ticks: { color: '#555', font: { size: 11 }, maxTicksLimit: 12, autoSkip: true }
      },
      y: {
        grid: { color: '#1a1a28' },
        ticks: { color: '#555', font: { size: 11 }, callback: v => '$' + v.toLocaleString() }
      }
    }
  }
});

// ── Legend ──
function renderLegend(datasets) {
  const legendEl = document.getElementById('customLegend');
  legendEl.innerHTML = '';
  datasets.forEach((ds, i) => {
    const c = ds.borderColor;
    const item = document.createElement('div');
    item.className = 'legend-item active';
    item.style.setProperty('--c', c);
    item.innerHTML = `<span class="legend-swatch"></span><span>${ds.label}</span><span class="legend-check">✓</span>`;
    item.addEventListener('click', () => {
      const meta = chartInstance.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      item.classList.toggle('active', !meta.hidden);
      chartInstance.update();
    });
    legendEl.appendChild(item);
  });
}

// ── Stats ──
function renderStats(records) {
  const statsEl = document.getElementById('statsGrid');
  statsEl.innerHTML = '';
  grades.forEach(g => {
    const pts = records.filter(r => r.psa === g);
    if (!pts.length) return;
    const usds = pts.map(r => r.usd);
    const avg  = Math.round(usds.reduce((a,b)=>a+b,0) / usds.length);
    const max  = Math.max(...usds);
    const min  = Math.min(...usds);
    const c    = colors[g].line;
    statsEl.innerHTML += `
      <div class="stat-card" style="border-left:3px solid ${c}60">
        <div class="stat-label" style="color:${c}cc">PSA ${g} &nbsp;·&nbsp; ${pts.length} 筆成交</div>
        <div class="stat-main">
          <div class="stat-main-tag">均價</div>
          <div class="stat-value" style="color:#fff">$${avg.toLocaleString()}</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-range">
          <div class="stat-range-item">
            <div class="stat-range-tag">最低</div>
            <div class="stat-range-val">$${min.toLocaleString()}</div>
          </div>
          <div class="stat-range-item">
            <div class="stat-range-tag">最高</div>
            <div class="stat-range-val">$${max.toLocaleString()}</div>
          </div>
        </div>
      </div>`;
  });
}

// ── Table ──
const sorters = {
  'date-desc':  (a,b) => new Date(b.date) - new Date(a.date),
  'date-asc':   (a,b) => new Date(a.date) - new Date(b.date),
  'price-desc': (a,b) => b.usd - a.usd,
  'price-asc':  (a,b) => a.usd - b.usd,
  'psa-desc':   (a,b) => b.psa - a.psa,
};

function renderTable(records, sortKey) {
  const tbody = document.getElementById('tableBody');
  const data  = [...records].sort(sorters[sortKey] || sorters['date-desc']);
  tbody.innerHTML = data.map(r => {
    const c = (colors[r.psa] || {line:'#888'}).line;
    return `<tr>
      <td>${r.date}</td>
      <td><span class="psa-badge" style="background:${c}18;color:${c};border:1px solid ${c}38">PSA ${r.psa}</span></td>
      <td style="font-weight:700;color:#eee">$${r.usd.toLocaleString()}</td>
      <td style="font-weight:600;color:#eee">NT$${r.twd.toLocaleString()}</td>
      <td style="color:#bbb">${r.source}</td>
    </tr>`;
  }).join('');
}

// ── Sort buttons ──
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderTable(pokemonDB[currentPokeKey].records, currentSort);
  });
});

// ══════════════════════════════════════════════
// ── Switch Pokémon ──
// ══════════════════════════════════════════════
function switchPokemon(key) {
  if (key === currentPokeKey) return;
  currentPokeKey = key;
  const poke = pokemonDB[key];

  // Update selector tabs
  document.querySelectorAll('.poke-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.poke === key)
  );

  // Update header
  document.getElementById('headerTitle').textContent = `繁中首刷${poke.zh}成交紀錄`;
  document.getElementById('headerSub').textContent   = `${poke.en} · Pokemon Chinese 1st Edition · PSA Grading`;
  document.querySelector('.header').style.setProperty('--header-glow', poke.glow);
  document.querySelector('.header-eyebrow').style.color = poke.accent;

  // Show/hide empty state
  const hasData = poke.records.length > 0;
  document.getElementById('mainContent').style.display = hasData ? 'block' : 'none';
  document.getElementById('emptyState').style.display  = hasData ? 'none'  : 'block';
  const emptyIcon = document.getElementById('emptyIcon');
  emptyIcon.src = poke.icon;
  emptyIcon.alt = poke.zh;

  if (hasData) {
    // Update chart
    const datasets = buildDatasets(poke.records);
    chartInstance.data.datasets = datasets;
    chartInstance.update();
    renderLegend(datasets);

    // Reset sort & re-render
    currentSort = 'date-desc';
    document.querySelectorAll('.sort-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.sort === 'date-desc')
    );
    renderStats(poke.records);
    renderTable(poke.records, currentSort);
  }
}

// ── Initial render ──
renderLegend(buildDatasets(pokemonDB.charizard.records));
renderStats(pokemonDB.charizard.records);
renderTable(pokemonDB.charizard.records, currentSort);
