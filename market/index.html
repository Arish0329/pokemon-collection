<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Prices · Arish Collection</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07070f;
    --bg-card:   #0d0d1e;
    --bg-panel:  #0f0f1a;
    --border:    #1e1e2e;
    --border-hi: #2a2a3e;
    --text:      #d8d8ea;
    --text-muted:#9090b0;
    --text-dim:  #5a5a7a;
    --market:    #4e9eff;
    --market-light: #7ec3ff;
    --market-glow:  rgba(78,158,255,0.3);
  }

  html, body {
    min-height: 100vh;
    font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Top Nav ── */
  .topnav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    height: 52px;
    background: rgba(7,7,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 10px 6px 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .nav-back:hover { color: var(--text); background: var(--bg-card); }
  .nav-back-arrow { font-size: 0.9rem; }

  .nav-sep {
    font-size: 0.75rem;
    color: var(--border-hi);
  }

  .nav-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--market);
    letter-spacing: 0.04em;
  }

  /* ── Page Body ── */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px 64px;
  }

  /* ── Page Header ── */
  .page-header {
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .page-header h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .page-header h1 span {
    color: var(--market);
  }

  .page-header p {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ── Section Title ── */
  .section-title {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    font-weight: 700;
  }

  /* ── Chart Panel ── */
  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .custom-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-hi);
    background: #13131f;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
    font-size: 12px;
    color: #888;
  }
  .legend-item.active {
    border-color: var(--c);
    color: #ddd;
  }
  .legend-item.active .legend-check { opacity: 1; }
  .legend-item:not(.active) { opacity: 0.4; }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    background: var(--c);
    flex-shrink: 0;
  }
  .legend-check {
    font-size: 11px;
    color: var(--c);
    opacity: 0;
    transition: opacity 0.15s;
  }

  canvas { display: block; width: 100% !important; }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border-hi); }

  .stat-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 900;
  }

  .stat-sub {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* ── Records Table ── */
  .table-wrap {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  th {
    background: #13131f;
    color: var(--text-dim);
    font-weight: 700;
    padding: 10px 16px;
    text-align: left;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid #0d0d1a;
    color: var(--text-muted);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #13131f; }

  .owned-badge {
    display: inline-block;
    background: rgba(78,158,255,0.12);
    color: var(--market);
    border: 1px solid rgba(78,158,255,0.3);
    border-radius: 4px;
    font-size: 0.6rem;
    padding: 1px 6px;
    margin-left: 6px;
    font-weight: 700;
  }

  .psa-badge {
    display: inline-block;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page { padding: 24px 16px 48px; }
    th, td { padding: 8px 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="topnav">
  <a class="nav-back" href="../index.html">
    <span class="nav-back-arrow">←</span>
    <span>ARISH</span>
  </a>
  <span class="nav-sep">/</span>
  <span class="nav-title">Market Prices</span>
</nav>

<div class="page">

  <!-- Header -->
  <div class="page-header">
    <h1>噴火龍 <span>市場行情</span></h1>
    <p>Charizard · Pokemon Chinese 1st Edition PSA · 資料來源：eBay / Fanatics / Goldin</p>
  </div>

  <!-- Chart -->
  <div class="chart-panel">
    <div class="custom-legend" id="customLegend"></div>
    <canvas id="trendChart" height="90"></canvas>
  </div>

  <!-- Stats -->
  <p class="section-title">各評級均價統計</p>
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Records Table -->
  <p class="section-title">完整成交紀錄</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>PSA</th>
          <th>USD</th>
          <th>TWD</th>
          <th>來源</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>
const raw = [
  {date:'2026/5/10',psa:6,usd:4360,twd:140828,source:'eBay',owned:false},
  {date:'2025/11/9',psa:8,usd:3360,twd:108528,source:'Fanatics',owned:true},
  {date:'2025/11/2',psa:8,usd:3240,twd:104652,source:'Fanatics',owned:false},
  {date:'2025/10/27',psa:7,usd:2640,twd:85272,source:'eBay',owned:false},
  {date:'2025/9/4',psa:8.5,usd:6806,twd:219834,source:'eBay',owned:false},
  {date:'2025/6/29',psa:8,usd:3950,twd:128375,source:'eBay',owned:false},
  {date:'2025/3/25',psa:8,usd:3480,twd:113100,source:'eBay',owned:false},
  {date:'2025/3/12',psa:9,usd:6000,twd:195000,source:'eBay',owned:false},
  {date:'2025/3/9',psa:8,usd:3110,twd:101075,source:'eBay',owned:false},
  {date:'2025/2/9',psa:8,usd:2450,twd:79625,source:'eBay',owned:false},
  {date:'2024/8/24',psa:9,usd:3950,twd:127585,source:'eBay',owned:true},
  {date:'2024/7/21',psa:9,usd:6954,twd:225855,source:'Goldin',owned:false},
  {date:'2024/7/9',psa:8,usd:2378,twd:77285,source:'eBay',owned:false},
  {date:'2024/6/26',psa:7,usd:2200,twd:71060,source:'eBay',owned:false},
  {date:'2024/6/20',psa:7,usd:2300,twd:74290,source:'eBay',owned:false},
  {date:'2024/6/12',psa:9,usd:6105,twd:197192,source:'eBay',owned:false},
  {date:'2024/4/21',psa:8,usd:2190,twd:70080,source:'Fanatics',owned:false},
  {date:'2023/11/19',psa:8,usd:1680,twd:52920,source:'Fanatics',owned:false},
  {date:'2022/7/31',psa:8,usd:2760,twd:82800,source:'Fanatics',owned:false},
  {date:'2022/7/10',psa:9,usd:5040,twd:151200,source:'Fanatics',owned:false},
  {date:'2022/4/3',psa:9,usd:4920,twd:145140,source:'Fanatics',owned:false},
  {date:'2022/2/13',psa:7,usd:1710,twd:50445,source:'Fanatics',owned:false},
  {date:'2021/7/28',psa:8,usd:3050,twd:85400,source:'Fanatics',owned:false},
  {date:'2021/5/28',psa:8,usd:4005,twd:112140,source:'Fanatics',owned:false},
  {date:'2021/5/28',psa:8,usd:3450,twd:96600,source:'Fanatics',owned:false},
  {date:'2021/5/28',psa:8,usd:3250,twd:91000,source:'Fanatics',owned:false},
  {date:'2021/4/27',psa:9,usd:8130,twd:227640,source:'Fanatics',owned:false},
  {date:'2021/1/31',psa:6,usd:1975,twd:55300,source:'Fanatics',owned:false},
];

const grades = [9, 8.5, 8, 7, 6];
const colors = {
  9:   { line: '#c9a227', fill: 'rgba(201,162,39,0.08)' },
  8.5: { line: '#e87722', fill: 'rgba(232,119,34,0.08)' },
  8:   { line: '#4e9eff', fill: 'rgba(78,158,255,0.08)' },
  7:   { line: '#a78bfa', fill: 'rgba(167,139,250,0.08)' },
  6:   { line: '#34d399', fill: 'rgba(52,211,153,0.08)' },
};

const sorted = [...raw].sort((a,b) => new Date(a.date) - new Date(b.date));

const datasets = grades.map(g => {
  const points = sorted.filter(r => r.psa === g).map(r => ({
    x: new Date(r.date.replace(/\//g, '-')),
    y: r.usd
  }));
  return {
    label: `PSA ${g}`,
    data: points,
    borderColor: colors[g].line,
    backgroundColor: colors[g].fill,
    pointBackgroundColor: colors[g].line,
    pointRadius: 5,
    pointHoverRadius: 7,
    borderWidth: 2,
    tension: 0.3,
    fill: false,
    spanGaps: true,
  };
}).filter(d => d.data.length > 0);

const chart = new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: { datasets },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#13131f',
        borderColor: '#2a2a3e',
        borderWidth: 1,
        titleColor: '#888',
        bodyColor: '#eee',
        padding: 10,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}  $${ctx.parsed.y.toLocaleString()} USD`
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'month', displayFormats: { month: 'yyyy/MM' } },
        grid: { color: '#1a1a28' },
        ticks: { color: '#555', font: { size: 11 }, maxTicksLimit: 12, autoSkip: true }
      },
      y: {
        grid: { color: '#1a1a28' },
        ticks: {
          color: '#555',
          font: { size: 11 },
          callback: v => '$' + v.toLocaleString()
        }
      }
    }
  }
});

// Custom Legend
const legendEl = document.getElementById('customLegend');
chart.data.datasets.forEach((ds, i) => {
  const c = ds.borderColor;
  const item = document.createElement('div');
  item.className = 'legend-item active';
  item.style.setProperty('--c', c);
  item.innerHTML = `<span class="legend-swatch"></span><span>${ds.label}</span><span class="legend-check">✓</span>`;
  item.addEventListener('click', () => {
    const meta = chart.getDatasetMeta(i);
    const hidden = !meta.hidden;
    meta.hidden = hidden;
    item.classList.toggle('active', !hidden);
    chart.update();
  });
  legendEl.appendChild(item);
});

// Stats
const statsEl = document.getElementById('statsGrid');
grades.forEach(g => {
  const pts = raw.filter(r => r.psa === g);
  if (!pts.length) return;
  const usds = pts.map(r => r.usd);
  const avg = Math.round(usds.reduce((a,b)=>a+b,0)/usds.length);
  const max = Math.max(...usds);
  const min = Math.min(...usds);
  const c = colors[g];
  statsEl.innerHTML += `
    <div class="stat-card">
      <div class="stat-label">PSA ${g} · ${pts.length} 筆</div>
      <div class="stat-value" style="color:${c.line}">$${avg.toLocaleString()}</div>
      <div class="stat-sub">均價<br>低 $${min.toLocaleString()} · 高 $${max.toLocaleString()}</div>
    </div>`;
});

// Table
const tbody = document.getElementById('tableBody');
[...raw].sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(r => {
  const c = colors[r.psa] || {line:'#888'};
  tbody.innerHTML += `<tr>
    <td>${r.date}${r.owned ? '<span class="owned-badge">我的卡</span>' : ''}</td>
    <td><span class="psa-badge" style="background:${c.line}22;color:${c.line};border:1px solid ${c.line}44">PSA ${r.psa}</span></td>
    <td style="font-weight:700;color:#eee">$${r.usd.toLocaleString()}</td>
    <td style="color:#666">NT$${r.twd.toLocaleString()}</td>
    <td style="color:#555">${r.source}</td>
  </tr>`;
});
</script>
</body>
</html>
