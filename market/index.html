<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Prices · Arish Collection</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07070f;
    --bg-card:   #0d0d1e;
    --bg-panel:  #0f0f1a;
    --border:    #1e1e2e;
    --border-hi: #2a2a3e;
    --text:      #d8d8ea;
    --text-muted:#9090b0;
    --text-dim:  #5a5a7a;
    --accent:    #4e9eff;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Nav Bar ── */
  .nav {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,7,15,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 12px 6px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .nav-back:hover { color: var(--text); border-color: var(--border); background: rgba(255,255,255,0.04); }
  .nav-back-arrow { font-size: 0.9rem; }
  .nav-brand {
    margin-left: 16px;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .nav-brand span { color: var(--accent); }

  /* ── Hero Header ── */
  .header {
    text-align: center;
    padding: 48px 20px 36px;
    background: linear-gradient(180deg, #0a0a22 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: --glow-color 0.4s;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 55% at 50% 0%, var(--header-glow, rgba(78,158,255,0.09)) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.5s;
  }
  .header-eyebrow {
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.2em;
    line-height: 1;
    margin-bottom: 4px;
    transition: color 0.3s;
  }
  .header-title {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.04em;
    text-shadow: 0 0 40px var(--header-glow, rgba(78,158,255,0.22));
    transition: text-shadow 0.3s;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 0.82rem;
    color: #9090b0;
    letter-spacing: 0.1em;
  }
  .header-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .h-badge {
    font-size: 0.72rem;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ── Pokémon Selector ── */
  /* ── Pokémon 可搜尋下拉選單 ── */
  .poke-selector {
    display: flex;
    justify-content: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .poke-combo {
    position: relative;
    width: min(440px, 92vw);
    font-family: inherit;
  }
  /* 觸發按鈕（顯示目前選擇） */
  .poke-combo-trigger {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--tab-accent, var(--border-hi));
    background: var(--bg-panel);
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 6px 16px rgba(0,0,0,0.35), 0 0 22px var(--tab-glow, transparent);
    transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
  }
  .poke-combo-trigger:hover { background: var(--bg-card); }
  .poke-combo-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .poke-combo-icon {
    width: 42px; height: 42px; object-fit: contain; flex-shrink: 0;
    filter: drop-shadow(0 0 8px var(--tab-glow, transparent));
  }
  .poke-combo-dex {
    font-size: 0.82rem; font-weight: 700; color: var(--text-muted);
    font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
  }
  .poke-combo-name { font-size: 1.05rem; font-weight: 900; color: var(--tab-accent, #fff); }
  .poke-combo-en { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.05em; }
  .poke-combo-count {
    margin-left: auto;
    font-size: 0.7rem; font-weight: 700; color: var(--tab-accent, var(--text-muted));
    border: 1px solid var(--tab-accent, var(--border));
    border-radius: 20px; padding: 3px 10px; white-space: nowrap;
    background: rgba(0,0,0,0.25);
  }
  .poke-combo-chevron {
    color: var(--text-dim); font-size: 0.7rem; margin-left: 2px;
    transition: transform 0.25s ease;
  }
  .poke-combo.open .poke-combo-chevron { transform: rotate(180deg); }

  /* 下拉面板 */
  .poke-combo-panel {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    z-index: 200;
    background: var(--bg-card);
    border: 1px solid var(--border-hi);
    border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.45);
    overflow: hidden;
    animation: comboIn 0.2s ease;
  }
  .poke-combo-panel[hidden] { display: none; }
  @keyframes comboIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .poke-combo-search { padding: 10px; border-bottom: 1px solid var(--border); }
  .poke-combo-search input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border-hi);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .poke-combo-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(78,158,255,0.15);
  }
  .poke-combo-search input::placeholder { color: var(--text-dim); }

  .poke-combo-list { max-height: 340px; overflow-y: auto; padding: 6px; }
  .poke-combo-option {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    padding: 8px 12px;
    min-height: 48px;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background 0.15s;
  }
  .poke-combo-option:hover,
  .poke-combo-option.highlight { background: rgba(255,255,255,0.05); }
  .poke-combo-option.selected { background: var(--opt-glow, rgba(78,158,255,0.12)); }
  .poke-combo-option-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .poke-combo-option-dex {
    font-size: 0.8rem; font-weight: 700; color: var(--text-dim);
    font-variant-numeric: tabular-nums; min-width: 32px;
  }
  .poke-combo-option-zh { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .poke-combo-option.selected .poke-combo-option-zh { color: var(--opt-accent, var(--accent)); }
  .poke-combo-option-en { font-size: 0.68rem; color: var(--text-dim); }
  .poke-combo-option-count {
    margin-left: auto; font-size: 0.68rem; font-weight: 700; color: var(--text-dim);
    white-space: nowrap;
  }
  .poke-combo-check { color: var(--opt-accent, var(--accent)); font-size: 0.8rem; width: 12px; opacity: 0; }
  .poke-combo-option.selected .poke-combo-check { opacity: 1; }
  .poke-combo-empty { padding: 28px 16px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }

  /* ── Page Body ── */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px 64px;
  }

  /* ── Empty State ── */
  .empty-state {
    display: none;
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
  .empty-state p { font-size: 0.8rem; }

  /* ── Section Title ── */
  .section-title {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    margin-top: 8px;
    font-weight: 700;
  }

  /* ── Chart Panel ── */
  /* ── 鑑定公司切換器 ── */
  .grading-toggle {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .grade-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f3f4f7;                     /* 白底晶片：讓黑色 BGS LOGO 也清楚可見 */
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 9px 18px;
    cursor: pointer;
    opacity: 0.5;
    font-family: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: opacity 0.2s, border-color 0.2s, box-shadow 0.25s, transform 0.2s;
  }
  .grade-tab:hover { opacity: 0.85; transform: translateY(-1px); }
  .grade-tab.active {
    opacity: 1;
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(78,158,255,0.3), 0 2px 8px rgba(0,0,0,0.3);
  }
  .grade-tab.disabled { opacity: 0.28; cursor: not-allowed; }
  .grade-tab.disabled:hover { transform: none; opacity: 0.28; }
  .grade-logo { height: 26px; width: auto; max-width: 96px; object-fit: contain; display: block; }
  .grade-count {
    font-size: 0.7rem;
    font-weight: 800;
    color: #5a5a6a;
    background: rgba(0,0,0,0.07);
    border-radius: 20px;
    padding: 2px 9px;
    white-space: nowrap;
  }
  .grade-tab.active .grade-count { color: #1a1a24; background: rgba(0,0,0,0.12); }

  .chart-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .custom-legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border-hi);
    background: #13131f;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
    font-size: 12px;
    color: #888;
  }
  .legend-item.active { border-color: rgba(78,158,255,0.4); color: #ccc; }
  .legend-item.active .legend-check { opacity: 1; }
  .legend-item:not(.active) { opacity: 0.35; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--c); flex-shrink: 0; }
  .legend-check { font-size: 11px; color: var(--c); opacity: 0; transition: opacity 0.15s; }
  .chart-container { position: relative; height: 380px; }
  canvas { display: block; }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .stat-card:hover { border-color: var(--border-hi); }
  .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
  .stat-main { display: flex; flex-direction: column; gap: 2px; }
  .stat-main-tag { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .stat-value { font-size: 1.5rem; font-weight: 900; line-height: 1.1; }
  .stat-divider { height: 1px; background: var(--border); }
  .stat-range { display: flex; gap: 12px; }
  .stat-range-item { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .stat-range-tag { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
  .stat-range-val { font-size: 0.82rem; font-weight: 700; color: var(--text); }

  /* ── Records Table ── */
  .table-wrap {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th {
    background: #13131f;
    color: var(--text-dim);
    font-weight: 700;
    padding: 10px 16px;
    text-align: left;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 16px; border-bottom: 1px solid #0d0d1a; color: var(--text-muted); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #13131f; }
  .psa-badge { display: inline-block; border-radius: 4px; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; }

  /* ── Sort Bar ── */
  .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .sort-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }
  .sort-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .sort-btn:hover { color: var(--text); border-color: var(--border-hi); background: rgba(255,255,255,0.03); }
  .sort-btn.active { color: var(--accent); border-color: rgba(78,158,255,0.5); background: rgba(78,158,255,0.08); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeUp 0.4s ease both; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .page { padding: 24px 16px 48px; }
    th, td { padding: 8px 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .poke-combo-en { display: none; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="nav-back" href="../index.html">
    <span class="nav-back-arrow">←</span>
    <span>返回首頁</span>
  </a>
  <span class="nav-brand">ARISH <span>COLLECTION</span></span>
</nav>

<!-- Hero Header -->
<header class="header">
  <p class="header-eyebrow">Market Prices</p>
  <h1 class="header-title" id="headerTitle">繁中首刷噴火龍成交紀錄</h1>
  <p class="header-sub" id="headerSub">Charizard · Pokemon Chinese 1st Edition · PSA Grading</p>
  <div class="header-badges">
    <span class="h-badge">eBay / Fanatics / Goldin / Heritage / 社團</span>
  </div>
</header>

<!-- Pokémon Selector -->
<div class="poke-selector">
  <div class="poke-combo" id="pokeCombo">
    <button class="poke-combo-trigger" id="comboTrigger" aria-haspopup="listbox" aria-expanded="false" aria-label="選擇寶可夢卡片">
      <img class="poke-combo-icon" id="triggerIcon" src="" alt="">
      <span class="poke-combo-dex" id="triggerDex"></span>
      <span class="poke-combo-name" id="triggerName"></span>
      <span class="poke-combo-en" id="triggerEn"></span>
      <span class="poke-combo-count" id="triggerCount"></span>
      <span class="poke-combo-chevron" aria-hidden="true">▼</span>
    </button>
    <div class="poke-combo-panel" id="comboPanel" role="listbox" aria-label="卡片清單" hidden>
      <div class="poke-combo-search">
        <input type="text" id="comboSearch" placeholder="搜尋編號或名稱…（例：004 或 噴火龍）" autocomplete="off" aria-label="搜尋卡片">
      </div>
      <div class="poke-combo-list" id="comboList"></div>
    </div>
  </div>
</div>

<div class="page">

  <!-- 鑑定公司切換（始終可見，預設 PSA）-->
  <div class="grading-toggle" role="tablist" aria-label="鑑定公司">
    <button class="grade-tab active" data-company="PSA" id="gradeTabPSA" role="tab" aria-selected="true">
      <img src="images/logo-psa.png" alt="PSA" class="grade-logo">
      <span class="grade-count" id="countPSA"></span>
    </button>
    <button class="grade-tab" data-company="BGS" id="gradeTabBGS" role="tab" aria-selected="false">
      <img src="images/logo-bgs.png" alt="BGS" class="grade-logo">
      <span class="grade-count" id="countBGS"></span>
    </button>
  </div>

  <!-- Main content (chart + stats + table) -->
  <div id="mainContent">

    <div class="chart-panel anim">
      <div class="custom-legend" id="customLegend"></div>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <p class="section-title">各評級近期行情</p>
    <div class="stats-grid" id="statsGrid"></div>

    <p class="section-title">完整成交紀錄</p>
    <div class="sort-bar">
      <span class="sort-label">排序</span>
      <button class="sort-btn active" data-sort="date-desc">📅 日期最新</button>
      <button class="sort-btn" data-sort="date-asc">📅 日期最舊</button>
      <button class="sort-btn" data-sort="price-desc">💰 價格最高</button>
      <button class="sort-btn" data-sort="price-asc">💰 價格最低</button>
      <button class="sort-btn" data-sort="psa-desc">🏅 評級最高</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th><th id="tableGradeHead">PSA</th><th>USD</th><th>TWD</th><th>來源</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <img class="empty-state-icon" id="emptyIcon" src="" alt="" style="width:80px;height:80px;object-fit:contain;opacity:0.4;">
    <h3 id="emptyMsg">尚無成交紀錄</h3>
    <p>資料陸續新增中，敬請期待</p>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// ── Pokémon Database ──
// ══════════════════════════════════════════════
const pokemonDB = {

      {date:'2026/6/18',psa:9,  usd:14640,twd:472872,company:'BGS',source:'ALT'},
      {date:'2026/6/18',psa:8.5,usd:10547,twd:340668,company:'BGS',source:'ALT'},
      {date:'2026/6/7', psa:6.5,usd:3350, twd:108205,company:'BGS',source:'Fanatics'},
      {date:'2025/12/28',psa:9, usd:8700, twd:281010,company:'BGS',source:'Fanatics'},
      {date:'2025/9/28',psa:7.5,usd:4920, twd:158916,company:'BGS',source:'Fanatics'},

  6:   { line: '#3458b8', fill: 'rgba(52,88,184,0.07)' },    // 深藍
};

// BGS 評級（含半級）與配色
const gradesBGS = [10, 9.5, 9, 8.5, 8, 7.5, 7, 6.5, 6];
const colorsBGS = {
  10:  { line: '#f5f0c0', fill: 'rgba(245,240,192,0.07)' },
  9.5: { line: '#e8c84a', fill: 'rgba(232,200,74,0.07)' },
  9:   { line: '#c9a227', fill: 'rgba(201,162,39,0.07)' },
  8.5: { line: '#e07030', fill: 'rgba(224,112,48,0.07)' },
  8:   { line: '#88c4f8', fill: 'rgba(136,196,248,0.07)' },
  7.5: { line: '#5fa0e8', fill: 'rgba(95,160,232,0.07)' },
  7:   { line: '#4e80e0', fill: 'rgba(78,128,224,0.07)' },
  6.5: { line: '#3f66c8', fill: 'rgba(63,102,200,0.07)' },
  6:   { line: '#3458b8', fill: 'rgba(52,88,184,0.07)' },
};

// ── State ──
let currentPokeKey = 'charizard';
let currentSort    = 'date-desc';
let currentCompany = 'PSA';
let chartInstance  = null;

// ── 鑑定公司切換輔助 ──
const isPSA = r => !r.company || r.company === 'PSA';
const isBGS = r => r.company === 'BGS';
function recordsForCompany(records) {
  return currentCompany === 'BGS' ? records.filter(isBGS) : records.filter(isPSA);
}
function activeGrades() { return currentCompany === 'BGS' ? gradesBGS : grades; }
function activeColors() { return currentCompany === 'BGS' ? colorsBGS : colors; }
function gradeLabel(g) { return `${currentCompany} ${g}`; }

// ══════════════════════════════════════════════
// ── Build Pokémon Selector ──
// ══════════════════════════════════════════════
const comboEl      = document.getElementById('pokeCombo');
const comboTrigger = document.getElementById('comboTrigger');
const comboPanel   = document.getElementById('comboPanel');
const comboSearch  = document.getElementById('comboSearch');
const comboList    = document.getElementById('comboList');

// 依圖鑑編號（dex）由小到大排序，無編號者排最後
const sortedPokes = Object.entries(pokemonDB)
  .sort((a, b) => (a[1].dex ?? 999) - (b[1].dex ?? 999));
const padDex = n => String(n ?? '').padStart(3, '0');

// 建立／過濾選項清單
function buildOptions(filter = '') {
  const f = filter.trim().toLowerCase();
  const matches = sortedPokes.filter(([key, p]) =>
    !f || padDex(p.dex).includes(f) || String(p.dex).includes(f)
       || p.zh.toLowerCase().includes(f) || p.en.toLowerCase().includes(f)
  );
  comboList.innerHTML = '';
  if (matches.length === 0) {
    comboList.innerHTML = '<div class="poke-combo-empty">找不到符合的卡片，試試其他關鍵字</div>';
    return;
  }
  matches.forEach(([key, p]) => {
    const opt = document.createElement('button');
    opt.className = 'poke-combo-option' + (key === currentPokeKey ? ' selected' : '');
    opt.dataset.poke = key;
    opt.setAttribute('role', 'option');
    opt.setAttribute('aria-selected', key === currentPokeKey ? 'true' : 'false');
    opt.style.setProperty('--opt-accent', p.accent);
    opt.style.setProperty('--opt-glow', p.glow);
    opt.innerHTML = `
      <img class="poke-combo-option-icon" src="${p.icon}" alt="">
      <span class="poke-combo-option-dex">${padDex(p.dex)}</span>
      <span class="poke-combo-option-zh">${p.zh}</span>
      <span class="poke-combo-option-en">${p.en}</span>
      <span class="poke-combo-option-count">${p.records.length} 筆</span>
      <span class="poke-combo-check" aria-hidden="true">✓</span>`;
    opt.addEventListener('click', () => selectPoke(key));
    comboList.appendChild(opt);
  });
}

// 更新觸發按鈕顯示
function updateTrigger(key) {
  const p = pokemonDB[key];
  comboTrigger.style.setProperty('--tab-accent', p.accent);
  comboTrigger.style.setProperty('--tab-glow', p.glow);
  document.getElementById('triggerIcon').src  = p.icon;
  document.getElementById('triggerIcon').alt  = p.zh;
  document.getElementById('triggerDex').textContent   = padDex(p.dex);
  document.getElementById('triggerName').textContent  = p.zh;
  document.getElementById('triggerEn').textContent    = p.en;
  document.getElementById('triggerCount').textContent = p.records.length + ' 筆';
}

function openCombo() {
  comboEl.classList.add('open');
  comboPanel.hidden = false;
  comboTrigger.setAttribute('aria-expanded', 'true');
  comboSearch.value = '';
  buildOptions();
  setTimeout(() => comboSearch.focus(), 30);
  const sel = comboList.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}
function closeCombo() {
  comboEl.classList.remove('open');
  comboPanel.hidden = true;
  comboTrigger.setAttribute('aria-expanded', 'false');
}
function selectPoke(key) {
  closeCombo();
  switchPokemon(key);
  updateTrigger(key);
}

comboTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  comboEl.classList.contains('open') ? closeCombo() : openCombo();
});
comboSearch.addEventListener('input', () => buildOptions(comboSearch.value));
document.addEventListener('click', (e) => {
  if (!comboEl.contains(e.target)) closeCombo();
});

// 鍵盤操作：上下移動、Enter 選取、Esc 關閉
function setHighlight(opts, idx) {
  opts.forEach(o => o.classList.remove('highlight'));
  if (opts[idx]) { opts[idx].classList.add('highlight'); opts[idx].scrollIntoView({ block: 'nearest' }); }
}
comboSearch.addEventListener('keydown', (e) => {
  const opts = [...comboList.querySelectorAll('.poke-combo-option')];
  if (e.key === 'Escape') { closeCombo(); comboTrigger.focus(); return; }
  if (!opts.length) return;
  let idx = opts.findIndex(o => o.classList.contains('highlight'));
  if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(opts, Math.min(idx + 1, opts.length - 1) < 0 ? 0 : Math.min(idx + 1, opts.length - 1)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); setHighlight(opts, idx <= 0 ? 0 : idx - 1); }
  else if (e.key === 'Enter') { e.preventDefault(); const t = opts[idx] || opts[0]; if (t) selectPoke(t.dataset.poke); }
});

// 初始化觸發按鈕為目前卡片
updateTrigger(currentPokeKey);

// ══════════════════════════════════════════════
// ── Chart Init ──
// ══════════════════════════════════════════════
function buildDatasets(records) {
  const recs = recordsForCompany(records);
  const sorted = [...recs].sort((a,b) => new Date(a.date) - new Date(b.date));
  const G = activeGrades(), C = activeColors();
  return G.map(g => {
    const points = sorted.filter(r => r.psa === g).map(r => ({
      x: new Date(r.date.replace(/\//g, '-')),
      y: r.usd,
      _record: r
    }));
    const col = C[g] || { line: '#888', fill: 'rgba(136,136,136,0.07)' };
    return {
      label: gradeLabel(g),
      data: points,
      borderColor: col.line,
      backgroundColor: col.fill,
      pointBackgroundColor: col.line,
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
      tension: 0.3,
      fill: false,
      spanGaps: true,
    };
  }).filter(d => d.data.length > 0);
}

chartInstance = new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: { datasets: buildDatasets(pokemonDB.charizard.records) },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'nearest', intersect: true },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#13131f',
        borderColor: '#2a2a3e',
        borderWidth: 1,
        titleColor: '#888',
        bodyColor: '#eee',
        padding: 10,
        callbacks: {
          title: ctx => {
            if (!ctx.length) return '';
            return ctx[0].raw.x.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
          },
          label: ctx => {
            const r = ctx.raw._record;
            if (!r) return ` ${ctx.dataset.label}  $${ctx.parsed.y.toLocaleString()} USD`;
            const gradeLabel = (r.company && r.company !== 'PSA') ? `${r.company} ${r.psa}` : `PSA ${r.psa}`;
            return [
              ` ${gradeLabel}`,
              ` $${r.usd.toLocaleString()} USD  ·  NT$${r.twd.toLocaleString()}`,
              ` ${r.source}`,
            ];
          }
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'month', displayFormats: { month: 'yyyy/MM' } },
        grid: { color: '#1a1a28' },
        ticks: { color: '#555', font: { size: 11 }, maxTicksLimit: 12, autoSkip: true }
      },
      y: {
        grid: { color: '#1a1a28' },
        ticks: { color: '#555', font: { size: 11 }, callback: v => '$' + v.toLocaleString() }
      }
    }
  }
});

// ── Legend ──
function renderLegend(datasets) {
  const legendEl = document.getElementById('customLegend');
  legendEl.innerHTML = '';
  datasets.forEach((ds, i) => {
    const c = ds.borderColor;
    const item = document.createElement('div');
    item.className = 'legend-item active';
    item.style.setProperty('--c', c);
    item.innerHTML = `<span class="legend-swatch"></span><span>${ds.label}</span><span class="legend-check">✓</span>`;
    item.addEventListener('click', () => {
      const meta = chartInstance.getDatasetMeta(i);
      meta.hidden = !meta.hidden;
      item.classList.toggle('active', !meta.hidden);
      chartInstance.update();
    });
    legendEl.appendChild(item);
  });
}

// ── Stats ──
function renderStats(records) {
  const statsEl = document.getElementById('statsGrid');
  statsEl.innerHTML = '';
  const recs = recordsForCompany(records);
  const G = activeGrades(), C = activeColors();
  G.forEach(g => {
    const pts = recs.filter(r => r.psa === g);
    if (!pts.length) return;
    const max  = Math.max(...pts.map(r => r.usd));        // 全期最高
    // 依日期由新到舊排序，取近 3 筆計算「近期均價」，避免久遠舊價拉低數值
    const sorted    = [...pts].sort((a,b) => new Date(b.date) - new Date(a.date));
    const recent    = sorted.slice(0, 3);
    const recentAvg = Math.round(recent.reduce((sum,r) => sum + r.usd, 0) / recent.length);
    const latest    = sorted[0].usd;                       // 最新單筆成交
    const c    = (C[g] || {line:'#888'}).line;
    statsEl.innerHTML += `
      <div class="stat-card" style="border-left:3px solid ${c}60">
        <div class="stat-label" style="color:${c}cc">${gradeLabel(g)} &nbsp;·&nbsp; ${pts.length} 筆成交</div>
        <div class="stat-main">
          <div class="stat-main-tag">近 ${recent.length} 筆均價</div>
          <div class="stat-value" style="color:#fff">$${recentAvg.toLocaleString()}</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-range">
          <div class="stat-range-item">
            <div class="stat-range-tag">最新</div>
            <div class="stat-range-val">$${latest.toLocaleString()}</div>
          </div>
          <div class="stat-range-item">
            <div class="stat-range-tag">全期最高</div>
            <div class="stat-range-val">$${max.toLocaleString()}</div>
          </div>
        </div>
      </div>`;
  });
}

// ── Table ──
const sorters = {
  'date-desc':  (a,b) => new Date(b.date) - new Date(a.date),
  'date-asc':   (a,b) => new Date(a.date) - new Date(b.date),
  'price-desc': (a,b) => b.usd - a.usd,
  'price-asc':  (a,b) => a.usd - b.usd,
  'psa-desc':   (a,b) => b.psa - a.psa,
};

function renderTable(records, sortKey) {
  const tbody = document.getElementById('tableBody');
  const data  = recordsForCompany(records).sort(sorters[sortKey] || sorters['date-desc']);
  const C = activeColors();
  tbody.innerHTML = data.map(r => {
    const c = (C[r.psa] || {line:'#888'}).line;
    return `<tr>
      <td>${r.date}</td>
      <td><span class="psa-badge" style="background:${c}18;color:${c};border:1px solid ${c}38">${gradeLabel(r.psa)}</span></td>
      <td style="font-weight:700;color:#eee">$${r.usd.toLocaleString()}</td>
      <td style="font-weight:600;color:#eee">NT$${r.twd.toLocaleString()}</td>
      <td style="color:#bbb">${r.source}</td>
    </tr>`;
  }).join('');
}

// ── Sort buttons ──
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderTable(pokemonDB[currentPokeKey].records, currentSort);
  });
});

// ══════════════════════════════════════════════
// ── Switch Pokémon ──
// ══════════════════════════════════════════════
function switchPokemon(key) {
  if (key === currentPokeKey) return;
  currentPokeKey = key;
  const poke = pokemonDB[key];

  // Update combobox trigger
  updateTrigger(key);

  // Update header
  document.getElementById('headerTitle').textContent = `繁中首刷${poke.zh}成交紀錄`;
  document.getElementById('headerSub').textContent   = `${poke.en} · Pokemon Chinese 1st Edition · PSA Grading`;
  document.querySelector('.header').style.setProperty('--header-glow', poke.glow);
  document.querySelector('.header-eyebrow').style.color = poke.accent;

  // 若目前在 BGS 但此卡無 BGS 資料，自動退回 PSA
  if (currentCompany === 'BGS' && !poke.records.some(isBGS)) {
    currentCompany = 'PSA';
    updateCompanyTabs();
  }

  // Reset sort
  currentSort = 'date-desc';
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === 'date-desc')
  );

  renderAll();
}

// ── 依「目前卡片 + 目前鑑定公司」渲染整頁 ──
function renderAll() {
  const poke = pokemonDB[currentPokeKey];
  const recs = recordsForCompany(poke.records);
  const hasData = recs.length > 0;

  document.getElementById('mainContent').style.display = hasData ? 'block' : 'none';
  document.getElementById('emptyState').style.display  = hasData ? 'none'  : 'block';
  document.getElementById('emptyMsg').textContent =
    currentCompany === 'BGS' ? '此卡尚無 BGS 成交紀錄' : '尚無成交紀錄';
  const emptyIcon = document.getElementById('emptyIcon');
  emptyIcon.src = poke.icon;
  emptyIcon.alt = poke.zh;
  document.getElementById('tableGradeHead').textContent = currentCompany;

  if (hasData) {
    const datasets = buildDatasets(poke.records);
    chartInstance.data.datasets = datasets;
    chartInstance.update();
    renderLegend(datasets);
    renderStats(poke.records);
    renderTable(poke.records, currentSort);
  }
  updateCompanyCounts();
}

// ── 切換器：更新筆數、active 狀態、停用無資料的公司 ──
function updateCompanyCounts() {
  const poke = pokemonDB[currentPokeKey];
  const bgsN = poke.records.filter(isBGS).length;
  document.getElementById('countPSA').textContent = poke.records.filter(isPSA).length + ' 筆';
  document.getElementById('countBGS').textContent = bgsN + ' 筆';
  document.getElementById('gradeTabBGS').classList.toggle('disabled', bgsN === 0);
}
function updateCompanyTabs() {
  document.querySelectorAll('.grade-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.company === currentCompany)
  );
  document.querySelectorAll('.grade-tab').forEach(t =>
    t.setAttribute('aria-selected', t.dataset.company === currentCompany ? 'true' : 'false')
  );
}
function switchCompany(company) {
  if (company === currentCompany) return;
  const poke = pokemonDB[currentPokeKey];
  if (company === 'BGS' && !poke.records.some(isBGS)) return;  // 無 BGS 資料不切換
  currentCompany = company;
  updateCompanyTabs();
  currentSort = 'date-desc';
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === 'date-desc')
  );
  renderAll();
}
document.querySelectorAll('.grade-tab').forEach(tab =>
  tab.addEventListener('click', () => {
    if (!tab.classList.contains('disabled')) switchCompany(tab.dataset.company);
  })
);

// ── Initial render ──
updateCompanyTabs();
renderAll();
</script>
</body>
