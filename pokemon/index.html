<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初代首刷寶可夢收藏 | Arish Collection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --bg-card: #0d0d1e;
      --bg-card-hover: #131328;
      --border: #1e1e3a;
      --border-holo: #c9a227;
      --glow-holo: rgba(201,162,39,0.4);
      --text: #d8d8ea;
      --text-dim: #5a5a7a;
      --gold: #c9a227;
      --gold-light: #f0d060;
      --blue: #4a8fff;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav Bar ── */
    .nav {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,15,0.8);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-back:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,0.04);
    }
    .nav-back-arrow { font-size: 0.9rem; }
    .nav-brand {
      margin-left: 16px;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .nav-brand span { color: var(--gold); }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 56px 20px 44px;
      background: linear-gradient(180deg, #0e0e28 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,162,39,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-titles {
      display: inline-block;
    }
    .header-eyebrow {
      font-size: clamp(1.3rem, 3.6vw, 2.1rem);
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 0px;
      line-height: 1;
      letter-spacing: 0.15em;
    }
    .header-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 40px rgba(201,162,39,0.25);
    }
    .header-sub {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #9090b0;
      letter-spacing: 0.12em;
    }

    /* ── Stats ── */
    .stats-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 28px 24px 0;
    }
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stats-main {
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .stats-number {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
    }
    .stats-badges {
      display: flex;
      gap: 10px;
    }
    .badge {
      font-size: 0.72rem;
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }
    .badge-holo  { border-color: var(--gold);   color: var(--gold); }
    .badge-common{ border-color: var(--border); color: var(--text-dim); }
    .progress-bar {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 3px;
      transition: width 1s ease;
      width: 0%;
    }

    /* ── Filters ── */
    .filters-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 24px 22px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 15px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.18s;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
      font-weight: 700;
    }

    /* ── Grid ── */
    .grid-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 600px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .grid-wrap, .filters-wrap, .stats-wrap { padding-left: 14px; padding-right: 14px; }
    }
    @media (min-width: 601px) and (max-width: 820px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Card ── */
    .card {
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card.collected { cursor: pointer; }
    .card.collected:hover { transform: translateY(-4px); }
    .card.holo {
      border-color: var(--border-holo);
      box-shadow: 0 0 10px var(--glow-holo);
    }
    .card.holo.collected:hover {
      box-shadow: 0 0 20px var(--glow-holo), 0 8px 24px rgba(0,0,0,0.6);
    }
    .card.common.collected:hover {
      border-color: #3a5a9f;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .card.hidden { display: none; }

    /* Card image — PSA scan ratio 380x639 */
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 380 / 639;
      position: relative;
      overflow: hidden;
      background: #060612;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .card.collected:hover .card-img-wrap img { transform: scale(1.04); }

    /* Placeholder */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: radial-gradient(circle at 50% 60%, #0d0d22 0%, #060610 80%);
    }
    .placeholder-icon { opacity: 0.15; width: 36px; height: 36px; }
    .placeholder-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* Card info */
    .card-info {
      padding: 8px 10px 9px;
    }
    .card-num {
      font-size: 0.62rem;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .card-name {
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .card.holo .card-num  { color: var(--gold); opacity: 0.8; }
    .card.holo .card-name { color: var(--gold-light); }
    .card-en {
      font-size: 0.66rem;
      color: #8c8ca8;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .card.holo .card-en { color: var(--gold); opacity: 0.85; }

    /* HOLO badge */
    .badge-holo-tag {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 0.5rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #000;
      background: linear-gradient(135deg, #c9a227, #f0d060);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Collected tick */
    .tick-badge {
      position: absolute;
      top: 6px; left: 6px;
      width: 18px; height: 18px;
      background: rgba(74,143,255,0.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .tick-badge svg { width: 10px; height: 10px; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .lightbox-img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
    .lightbox-holo { border: 2px solid var(--gold); box-shadow: 0 0 30px var(--glow-holo); }
    .lightbox-info { margin-top: 18px; }
    .lightbox-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
    }
    .lightbox-sub {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 5px;
    }
    .lightbox-close {
      position: absolute;
      top: -44px; right: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .lightbox-close:hover { border-color: var(--text); }

    /* ── Search ── */
    .search-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 24px 22px;
    }
    .search-box { position: relative; display: flex; align-items: center; }
    .search-box > svg {
      position: absolute; left: 14px;
      width: 16px; height: 16px;
      stroke: var(--text-dim);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
    }
    .search-clear {
      position: absolute; right: 8px;
      width: 28px; height: 28px;
      border: none; background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 50%;
      font-size: 0.9rem;
      display: none; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .search-clear:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .search-clear.show { display: flex; }
    .search-count {
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--text-dim);
      min-height: 1em;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 52px 20px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* ── Lightbox nav & English name ── */
    .lightbox-nav {
      position: absolute;
      top: 38%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(13,13,30,0.7);
      backdrop-filter: blur(4px);
      color: var(--text);
      font-size: 1.4rem; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s, opacity 0.15s;
      z-index: 2;
    }
    .lightbox-nav:hover { border-color: var(--gold); background: rgba(13,13,30,0.95); }
    .lightbox-nav:disabled { opacity: 0.2; cursor: default; border-color: var(--border); }
    .lightbox-prev { left: -56px; }
    .lightbox-next { right: -56px; }
    .lightbox-en {
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .lightbox-cert {
      display: none;
      align-items: center;
      gap: 7px;
      margin-top: 16px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .lightbox-cert:hover { border-color: var(--gold); background: rgba(201,162,39,0.1); color: var(--gold-light); }
    .lightbox-cert span { color: var(--text-dim); font-weight: 400; font-size: 0.72rem; letter-spacing: 0.02em; }
    @media (max-width: 480px) {
      .lightbox-prev { left: 6px; }
      .lightbox-next { right: 6px; }
      .lightbox-nav { background: rgba(13,13,30,0.88); }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
    }
  </style>
</head>

</div>

const ASSET_VERSION = 5;  // 換圖後把這個數字 +1，舊圖快取就會失效（讓訪客重新下載新圖）
const imgId = id => `../images/${String(id).padStart(3,'0')}.jpg?v=${ASSET_VERSION}`;

let collected = new Set();
let activeFilter = 'all';
let searchQ = '';

// 英文卡名（對應 PSA/CGC 標籤，供 lightbox 顯示與搜尋）
const EN_NAMES = {
  1:'Alakazam',2:'Blastoise',3:'Chansey',4:'Charizard',5:'Clefairy',6:'Gyarados',7:'Hitmonchan',8:'Machamp',9:'Magneton',10:'Mewtwo',

  21:'Electrode',22:'Pidgeotto',23:'Arcanine',24:'Charmeleon',25:'Dewgong',26:'Dratini',27:"Farfetch'd",28:'Growlithe',29:'Haunter',30:'Ivysaur',
  31:'Jynx',32:'Kadabra',33:'Kakuna',34:'Machoke',35:'Magikarp',36:'Magmar',37:'Nidorino',38:'Poliwhirl',39:'Porygon',40:'Raticate',
  41:'Seel',42:'Wartortle',43:'Abra',44:'Bulbasaur',45:'Caterpie',46:'Charmander',47:'Diglett',48:'Doduo',49:'Drowzee',50:'Gastly',
  51:'Koffing',52:'Machop',53:'Magnemite',54:'Metapod',55:'Nidoran ♂',56:'Onix',57:'Pidgey',58:'Pikachu',59:'Poliwag',60:'Ponyta',
  61:'Rattata',62:'Sandshrew',63:'Squirtle',64:'Starmie',65:'Staryu',66:'Tangela',67:'Voltorb',68:'Vulpix',69:'Weedle',70:'Clefairy Doll',
  71:'Computer Search',72:'Devolution Spray',73:'Impostor Professor Oak',74:'Item Finder',75:'Lass',76:'Pokémon Breeder',77:'Pokémon Trader',78:'Scoop Up',79:'Super Energy Removal',80:'Defender',
  81:'Energy Retrieval',82:'Full Heal',83:'Maintenance',84:'PlusPower',85:'Pokémon Center',86:'Pokémon Flute',87:'Pokédex',88:'Professor Oak',89:'Revive',90:'Super Potion',
  91:'Bill',92:'Energy Removal',93:'Gust of Wind',94:'Potion',95:'Switch',96:'Double Colorless Energy',97:'Fighting Energy',98:'Fire Energy',99:'Grass Energy',100:'Lightning Energy',
  101:'Psychic Energy',102:'Water Energy'
};

// 鑑定證書（co 機構 + cert 證書號）；裸卡不列入。逐張依卡圖標籤核對。
const CERTS = {
  1:{co:'PSA',cert:'70713696'}, 2:{co:'PSA',cert:'85177123'}, 3:{co:'PSA',cert:'70713697'}, 4:{co:'PSA',cert:'65440073'},
  5:{co:'PSA',cert:'123438093'}, 6:{co:'PSA',cert:'66311566'}, 7:{co:'PSA',cert:'116094582'}, 8:{co:'PSA',cert:'123438096'},
  9:{co:'PSA',cert:'25808003'}, 10:{co:'PSA',cert:'123438098'}, 11:{co:'PSA',cert:'129714826'}, 12:{co:'PSA',cert:'124678412'},
  13:{co:'PSA',cert:'116094601'}, 14:{co:'PSA',cert:'124678416'}, 15:{co:'PSA',cert:'91277882'}, 16:{co:'PSA',cert:'101778370'}
};
function certUrl(c) {
  return c.co === 'CGC'
    ? `https://www.cgccards.com/certlookup/${c.cert}`
    : `https://www.psacard.com/cert/${c.cert}/psa`;
}

function matchSearch(card) {
  const q = searchQ.trim().toLowerCase();
  if (!q) return true;
  return card.name.toLowerCase().includes(q)
      || String(card.id).includes(q)
      || (EN_NAMES[card.id] || '').toLowerCase().includes(q);
}

// ── Load data ──
async function loadData() {
  try {
    const res = await fetch(`../data.json?t=${Date.now()}`);
    if (res.ok) {
      const data = await res.json();
      collected = new Set(data.collected || []);
    }
  } catch (_) {}
  render();
  updateStats();
}

// ── Render grid ──
function render() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  let visibleCount = 0;

  CARDS.forEach(card => {
    const isCollected = collected.has(card.id);
    const visible = matchFilter(card, isCollected) && matchSearch(card);
    if (visible) visibleCount++;

    const el = document.createElement('div');
    el.className = `card ${card.holo ? 'holo' : 'common'} ${isCollected ? 'collected' : ''} ${visible ? '' : 'hidden'}`;
    el.dataset.id = card.id;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    if (isCollected) {
      const img = document.createElement('img');
      img.src = imgId(card.id);
      img.alt = card.name;
      img.loading = 'lazy';
      imgWrap.appendChild(img);

      const tick = document.createElement('div');
      tick.className = 'tick-badge';
      tick.innerHTML = `<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5">
        <polyline points="1.5,5 4,7.5 8.5,2.5"/>
      </svg>`;
      imgWrap.appendChild(tick);

      el.addEventListener('click', () => openLightbox(card));
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-placeholder';
      ph.innerHTML = `
        <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <circle cx="12" cy="12" r="3" fill="none"/>
        </svg>
        <span class="placeholder-label">未收藏</span>`;
      imgWrap.appendChild(ph);
    }

    if (card.holo) {
      const badge = document.createElement('span');
      badge.className = 'badge-holo-tag';
      badge.textContent = 'HOLO';
      imgWrap.appendChild(badge);
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-num">No.${card.id}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-en">${EN_NAMES[card.id] || ''}</div>`;

    el.appendChild(imgWrap);
    el.appendChild(info);
    grid.appendChild(el);
  });

  if (visibleCount === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = searchQ ? `找不到符合「${searchQ}」的卡片` : '沒有符合條件的卡片';
    grid.appendChild(empty);
  }
  updateSearchCount(visibleCount);
}

function matchFilter(card, isCollected) {
  if (activeFilter === 'all')       return true;
  if (activeFilter === 'holo')      return card.holo;
  if (activeFilter === 'pokemon')   return card.cat === 'pokemon';
  if (activeFilter === 'trainer')   return card.cat === 'trainer';
  if (activeFilter === 'energy')    return card.cat === 'energy';
  if (activeFilter === 'collected') return isCollected;
  if (activeFilter === 'missing')   return !isCollected;
  return true;
}

// ── Stats ──
function updateStats() {
  const total = collected.size;
  const holoCollected  = CARDS.filter(c => c.holo  && collected.has(c.id)).length;
  const commonCollected = CARDS.filter(c => !c.holo && collected.has(c.id)).length;

  document.getElementById('stats-n').textContent = total;
  document.getElementById('badge-holo').textContent   = `閃卡 ${holoCollected} / 16`;
  document.getElementById('badge-common').textContent = `一般 ${commonCollected} / 86`;
  document.getElementById('progress-fill').style.width = `${(total / 102 * 100).toFixed(1)}%`;
}

// ── Filter buttons ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// ── Lightbox ──
let lbList = [];   // 目前可瀏覽的卡（受篩選 + 搜尋影響，且僅限已收藏）
let lbIndex = -1;

function getNavigableCards() {
  return CARDS.filter(card => {
    const isC = collected.has(card.id);
    return isC && matchFilter(card, isC) && matchSearch(card);
  });
}

function openLightbox(card) {
  lbList = getNavigableCards();
  lbIndex = lbList.findIndex(c => c.id === card.id);
  if (lbIndex < 0) { lbList = [card]; lbIndex = 0; }
  showLightboxAt(lbIndex);
  document.getElementById('lightbox').classList.add('open');
}

function showLightboxAt(i) {
  if (i < 0 || i >= lbList.length) return;
  lbIndex = i;
  const card = lbList[i];
  const img = document.getElementById('lightbox-img');
  img.src = imgId(card.id);
  img.alt = card.name;
  img.className = `lightbox-img${card.holo ? ' lightbox-holo' : ''}`;
  document.getElementById('lightbox-name').textContent = `No.${card.id} ${card.name}`;
  document.getElementById('lightbox-en').textContent = EN_NAMES[card.id] || '';
  document.getElementById('lightbox-sub').textContent =
    (card.holo ? '閃卡 HOLO' : catLabel(card.cat)) + ' · 初代首刷 · 繁體中文';
  const cert = CERTS[card.id];
  const certBtn = document.getElementById('lightbox-cert');
  if (cert) { certBtn.href = certUrl(cert); certBtn.style.display = 'inline-flex'; }
  else { certBtn.style.display = 'none'; }
  document.getElementById('lightbox-prev').disabled = (i <= 0);
  document.getElementById('lightbox-next').disabled = (i >= lbList.length - 1);
}

function lbNav(delta) {
  const ni = lbIndex + delta;
  if (ni >= 0 && ni < lbList.length) showLightboxAt(ni);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function catLabel(cat) {
  return { pokemon:'寶可夢卡', trainer:'訓練師／道具卡', energy:'能量卡', holo:'閃卡' }[cat] || '';
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox-prev').addEventListener('click', e => { e.stopPropagation(); lbNav(-1); });
document.getElementById('lightbox-next').addEventListener('click', e => { e.stopPropagation(); lbNav(1); });
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft')  lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(1);
});

// ── Search ──
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
searchInput.addEventListener('input', () => {
  searchQ = searchInput.value;
  searchClear.classList.toggle('show', searchQ.length > 0);
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQ = '';
  searchClear.classList.remove('show');
  render();
  searchInput.focus();
});

function updateSearchCount(n) {
  document.getElementById('search-count').textContent = searchQ ? `找到 ${n} 張` : '';
}

loadData();
</script>
