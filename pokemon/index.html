    :root {
      --bg: #07070f;
      --bg-card: #0d0d1e;
      --bg-card-hover: #131328;
      --border: #1e1e3a;
      --border-holo: #c9a227;
      --glow-holo: rgba(201,162,39,0.4);
      --text: #d8d8ea;
      --text-dim: #5a5a7a;
      --gold: #c9a227;
      --gold-light: #f0d060;
      --blue: #4a8fff;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav Bar ── */
    .nav {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,15,0.8);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-back:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,0.04);
    }
    .nav-back-arrow { font-size: 0.9rem; }
    .nav-brand {
      margin-left: 16px;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .nav-brand span { color: var(--gold); }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 56px 20px 44px;
      background: linear-gradient(180deg, #0e0e28 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,162,39,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-titles {
      display: inline-block;
    }
    .header-eyebrow {
      font-size: clamp(1.3rem, 3.6vw, 2.1rem);
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 0px;
      line-height: 1;
      letter-spacing: 0.15em;
    }
    .header-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 40px rgba(201,162,39,0.25);
    }
    .header-sub {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #9090b0;
      letter-spacing: 0.12em;
    }

    /* ── Stats ── */
    .stats-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 28px 24px 0;
    }
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stats-main {
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .stats-number {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
    }
    .stats-badges {
      display: flex;
      gap: 10px;
    }
    .badge {
      font-size: 0.72rem;
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }
    .badge-holo  { border-color: var(--gold);   color: var(--gold); }
    .badge-common{ border-color: var(--border); color: var(--text-dim); }
    .progress-bar {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 3px;
      transition: width 1s ease;
      width: 0%;
    }

    /* ── Filters ── */
    .filters-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 24px 22px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 15px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.18s;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
      font-weight: 700;
    }

    /* ── Grid ── */
    .grid-wrap {
      max-width: 940px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 600px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .grid-wrap, .filters-wrap, .stats-wrap { padding-left: 14px; padding-right: 14px; }
    }
    @media (min-width: 601px) and (max-width: 820px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Card ── */
    .card {
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card.collected { cursor: pointer; }
    .card.collected:hover { transform: translateY(-4px); }
    .card.holo {
      border-color: var(--border-holo);
      box-shadow: 0 0 10px var(--glow-holo);
    }
    .card.holo.collected:hover {
      box-shadow: 0 0 20px var(--glow-holo), 0 8px 24px rgba(0,0,0,0.6);
    }
    .card.common.collected:hover {
      border-color: #3a5a9f;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .card.hidden { display: none; }

    /* Card image — PSA scan ratio 380x639 */
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 380 / 639;
      position: relative;
      overflow: hidden;
      background: #060612;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .card.collected:hover .card-img-wrap img { transform: scale(1.04); }

    /* Placeholder */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: radial-gradient(circle at 50% 60%, #0d0d22 0%, #060610 80%);
    }
    .placeholder-icon { opacity: 0.15; width: 36px; height: 36px; }
    .placeholder-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* Card info */
    .card-info {
      padding: 8px 10px 9px;
    }
    .card-num {
      font-size: 0.62rem;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .card-name {
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .card.holo .card-num  { color: var(--gold); opacity: 0.8; }
    .card.holo .card-name { color: var(--gold-light); }

    /* HOLO badge */
    .badge-holo-tag {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 0.5rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #000;
      background: linear-gradient(135deg, #c9a227, #f0d060);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Collected tick */
    .tick-badge {
      position: absolute;
      top: 6px; left: 6px;
      width: 18px; height: 18px;
      background: rgba(74,143,255,0.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .tick-badge svg { width: 10px; height: 10px; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .lightbox-img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
    .lightbox-holo { border: 2px solid var(--gold); box-shadow: 0 0 30px var(--glow-holo); }
    .lightbox-info { margin-top: 18px; }
    .lightbox-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
    }
    .lightbox-sub {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 5px;
    }
    .lightbox-close {
      position: absolute;
      top: -44px; right: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .lightbox-close:hover { border-color: var(--text); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
    }
  </style>
</head>

// ── Load data ──
async function loadData() {
  try {
    const res = await fetch(`../data.json?t=${Date.now()}`);
    if (res.ok) {
      const data = await res.json();
      collected = new Set(data.collected || []);
    }
  } catch (_) {}
  render();
  updateStats();
}

// ── Render grid ──

    const isCollected = collected.has(card.id);
    const visible = matchFilter(card, isCollected);

    const el = document.createElement('div');
    el.className = `card ${card.holo ? 'holo' : 'common'} ${isCollected ? 'collected' : ''} ${visible ? '' : 'hidden'}`;
    el.dataset.id = card.id;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    if (isCollected) {
      const img = document.createElement('img');
      img.src = imgId(card.id);
      img.alt = card.name;
      img.loading = 'lazy';
      imgWrap.appendChild(img);

      const tick = document.createElement('div');
      tick.className = 'tick-badge';
      tick.innerHTML = `<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.5">
        <polyline points="1.5,5 4,7.5 8.5,2.5"/>
      </svg>`;
      imgWrap.appendChild(tick);

      el.addEventListener('click', () => openLightbox(card, imgId(card.id)));
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-placeholder';
      ph.innerHTML = `
        <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <circle cx="12" cy="12" r="3" fill="none"/>
        </svg>
        <span class="placeholder-label">未收藏</span>`;
      imgWrap.appendChild(ph);
    }

    if (card.holo) {
      const badge = document.createElement('span');
      badge.className = 'badge-holo-tag';
      badge.textContent = 'HOLO';
      imgWrap.appendChild(badge);
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-num">No.${card.id}</div>
      <div class="card-name">${card.name}</div>`;

    el.appendChild(imgWrap);
    el.appendChild(info);
    grid.appendChild(el);
  });
}

function matchFilter(card, isCollected) {
  if (activeFilter === 'all')       return true;
  if (activeFilter === 'holo')      return card.holo;
  if (activeFilter === 'pokemon')   return card.cat === 'pokemon';
  if (activeFilter === 'trainer')   return card.cat === 'trainer';
  if (activeFilter === 'energy')    return card.cat === 'energy';
  if (activeFilter === 'collected') return isCollected;
  if (activeFilter === 'missing')   return !isCollected;
  return true;
}

// ── Stats ──
function updateStats() {
  const total = collected.size;
  const holoCollected  = CARDS.filter(c => c.holo  && collected.has(c.id)).length;
  const commonCollected = CARDS.filter(c => !c.holo && collected.has(c.id)).length;

  document.getElementById('stats-n').textContent = total;
  document.getElementById('badge-holo').textContent   = `閃卡 ${holoCollected} / 16`;
  document.getElementById('badge-common').textContent = `一般 ${commonCollected} / 86`;
  document.getElementById('progress-fill').style.width = `${(total / 102 * 100).toFixed(1)}%`;
}

// ── Filter buttons ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// ── Lightbox ──
function openLightbox(card, src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  img.alt = card.name;
  img.className = `lightbox-img${card.holo ? ' lightbox-holo' : ''}`;
  document.getElementById('lightbox-name').textContent = `No.${card.id} ${card.name}`;
  document.getElementById('lightbox-sub').textContent =
    card.holo ? '閃卡 HOLO · 初代首刷 · 繁體中文' : `${catLabel(card.cat)} · 初代首刷 · 繁體中文`;
  lb.classList.add('open');
}

function catLabel(cat) {
  return { pokemon:'寶可夢卡', trainer:'訓練師／道具卡', energy:'能量卡', holo:'閃卡' }[cat] || '';
}

document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

loadData();
</script>
</body>
</html>
