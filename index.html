<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arish Collection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07070f;
      --bg-card:     #0d0d1e;
      --bg-card-hover: #131328;
      --border:      #1e1e3a;
      --text:        #d8d8ea;
      --text-dim:    #5a5a7a;
      --text-muted:  #9090b0;

      /* Pokémon — Gold */
      --pokemon:       #c9a227;
      --pokemon-light: #f0d060;
      --pokemon-glow:  rgba(201, 162, 39, 0.35);
      --pokemon-bg:    rgba(201, 162, 39, 0.05);

      /* NBA — Orange */
      --nba:           #e87722;
      --nba-light:     #ffaa55;
      --nba-glow:      rgba(232, 119, 34, 0.35);
      --nba-bg:        rgba(232, 119, 34, 0.05);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Page Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glows */
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 20% 20%, rgba(201,162,39,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 55% 40% at 80% 80%, rgba(232,119,34,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Brand Header ── */
    .brand {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.7s ease both;
    }

    .brand-name {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #fff;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(201,162,39,0.15),
        0 0 120px rgba(201,162,39,0.08);
    }

    .brand-sub {
      font-size: clamp(0.72rem, 2vw, 0.92rem);
      letter-spacing: 0.55em;
      color: var(--text-muted);
      margin-top: 10px;
      text-transform: uppercase;
    }

    .brand-divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pokemon), transparent);
      margin: 20px auto 0;
    }

    /* ── Collection Cards Grid ── */
    .collections {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 800px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    @media (max-width: 600px) {
      .collections { grid-template-columns: 1fr; max-width: 380px; }
    }

    /* ── Collection Card ── */
    .col-card {
      position: relative;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    .col-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
      transition: opacity 0.25s;
    }

    /* Pokémon Card */
    .col-card.pokemon { --accent: var(--pokemon); --accent-light: var(--pokemon-light); --accent-glow: var(--pokemon-glow); --accent-bg: var(--pokemon-bg); }
    .col-card.pokemon::before { background: linear-gradient(90deg, var(--pokemon), var(--pokemon-light)); }
    .col-card.pokemon:hover {
      border-color: var(--pokemon);
      box-shadow: 0 0 32px var(--pokemon-glow), 0 16px 40px rgba(0,0,0,0.5);
      background: var(--bg-card-hover);
      transform: translateY(-6px);
    }

    /* NBA Card */
    .col-card.nba { --accent: var(--nba); --accent-light: var(--nba-light); --accent-glow: var(--nba-glow); --accent-bg: var(--nba-bg); }
    .col-card.nba::before { background: linear-gradient(90deg, var(--nba), var(--nba-light)); }
    .col-card.nba:hover {
      border-color: var(--nba);
      box-shadow: 0 0 32px var(--nba-glow), 0 16px 40px rgba(0,0,0,0.5);
      background: var(--bg-card-hover);
      transform: translateY(-6px);
    }

    /* Disabled / Coming soon */
    .col-card.disabled {
      cursor: default;
      opacity: 0.7;
    }
    .col-card.disabled:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--border);
      background: var(--bg-card);
    }

    /* Card icon */
    .col-icon {
      font-size: 2.8rem;
      line-height: 1;
      margin-bottom: 20px;
      display: block;
      filter: drop-shadow(0 0 12px var(--accent-glow, transparent));
      transition: transform 0.25s;
    }
    .col-card:not(.disabled):hover .col-icon { transform: scale(1.1); }

    /* Card label (small uppercase type) */
    .col-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 700;
    }

    /* Card title */
    .col-title {
      font-size: clamp(1.25rem, 3vw, 1.6rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    /* Card description */
    .col-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Progress section */
    .col-progress {
      margin-top: auto;
      margin-bottom: 20px;
    }
    .col-progress-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .col-progress-text {
      font-size: 0.68rem;
      color: var(--text-dim);
    }
    .col-progress-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
    }
    .col-bar-bg {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .col-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    /* Coming soon badge */
    .col-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
      margin-bottom: 20px;
    }
    .col-badge.soon {
      border-color: var(--nba);
      color: var(--nba);
      background: var(--nba-bg);
    }
    .col-badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    /* CTA button */
    .col-cta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      transition: gap 0.2s;
    }
    .col-card:not(.disabled):hover .col-cta { gap: 10px; }
    .col-cta-arrow {
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .col-card:not(.disabled):hover .col-cta-arrow { transform: translateX(3px); }
    .col-cta.muted { color: var(--text-dim); }

    /* ── Footer ── */
    footer {
      margin-top: 56px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<main class="page">

  <!-- Brand -->
  <div class="brand">
    <h1 class="brand-name">ARISH</h1>
    <p class="brand-sub">Collection</p>
    <div class="brand-divider"></div>
  </div>

  <!-- Collection Cards -->
  <div class="collections">

    <!-- Pokémon -->
    <a class="col-card pokemon" href="./pokemon/index.html">
      <span class="col-icon">🎴</span>
      <p class="col-label">Pokémon TCG</p>
      <h2 class="col-title">初代首刷<br>寶可夢收藏</h2>
      <p class="col-desc">1st Edition · Traditional Chinese · Base Set · 102 張</p>
      <div class="col-progress">
        <div class="col-progress-label">
          <span class="col-progress-text">收藏進度</span>
          <span class="col-progress-count" id="poke-count">— / 102</span>
        </div>
        <div class="col-bar-bg">
          <div class="col-bar-fill" id="poke-bar"></div>
        </div>
      </div>
      <div class="col-cta">
        <span>進入收藏</span>
        <span class="col-cta-arrow">→</span>
      </div>
    </a>

    <!-- NBA -->
    <div class="col-card nba disabled">
      <span class="col-icon">🏀</span>
      <p class="col-label">NBA Trading Cards</p>
      <h2 class="col-title">NBA<br>球員卡收藏</h2>
      <p class="col-desc">球星簽名卡、RC 新人卡、限量短印收藏展示</p>
      <div class="col-badge soon">
        <span class="col-badge-dot"></span>
        即將推出
      </div>
      <div class="col-cta muted">
        <span>敬請期待</span>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    © Gary Chen · Arish Collection · 個人收藏展示，非商業用途
  </footer>

</main>

<script>
  // Load live Pokémon progress
  (async () => {
    try {
      const res = await fetch('./data.json?t=' + Date.now());
      if (!res.ok) return;
      const data = await res.json();
      const n = (data.collected || []).length;
      document.getElementById('poke-count').textContent = `${n} / 102`;
      requestAnimationFrame(() => {
        setTimeout(() => {
          document.getElementById('poke-bar').style.width = `${(n / 102 * 100).toFixed(1)}%`;
        }, 200);
      });
    } catch (_) {}
  })();
</script>

</body>
</html>
