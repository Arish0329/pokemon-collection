<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA 球員卡收藏 | Arish Collection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:        #0A0904;
      --bg-surface:     #111008;
      --bg-card:        #17140A;
      --gold-bright:    #F2C455;
      --gold-light:     #E8CC78;
      --gold-main:      #C9A84C;
      --gold-dim:       #8B7030;
      --gold-subtle:    #2E2412;
      --text-primary:   #EDE0C4;
      --text-secondary: #9A8B6A;
      --text-muted:     #5C5240;
      --border:         #201C10;
      --border-gold:    #3A3018;
      --shadow-gold:    rgba(201, 168, 76, 0.18);
      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      14px;
      --ease:           cubic-bezier(0.22, 0.61, 0.36, 1);
      --font-ui:        'Inter', sans-serif;
      --font-display:   'Noto Serif TC', 'Georgia', serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { overflow-x: hidden; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-gold);
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Top utility row ─────────────────────────── */
    .header-nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 200ms var(--ease);
    }
    .nav-back:hover { color: var(--gold-main); }

    .nav-brand {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .nav-brand span { color: var(--text-secondary); }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    /* ── Brand row ───────────────────────────────── */
    .header-brand-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 0 18px;
    }

    .header-brand h1 {
      font-size: 28px; font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold-light); line-height: 1;
    }

    .header-brand-meta {
      display: flex; align-items: center; gap: 8px;
      margin-top: 7px;
    }

    .header-brand-meta span {
      font-family: var(--font-ui); font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-secondary);
      margin-left: -0.06em; /* compensate for letter-spacing visual offset */
    }

    .header-brand-dot {
      width: 2px; height: 2px; border-radius: 50%;
      background: var(--border-gold); flex-shrink: 0;
    }

    /* ── Search row ──────────────────────────────── */
    .header-search-row {
      padding: 0 0 16px;
    }

    .search-wrap {
      position: relative;
      width: 100%;
    }

    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--gold-dim); pointer-events: none;
      display: flex; align-items: center;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-ui); font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      padding: 11px 44px 11px 44px;
      outline: none;
      transition: border-color 200ms var(--ease), background 200ms var(--ease), box-shadow 200ms var(--ease);
      caret-color: var(--gold-main);
    }

    .search-input::placeholder { color: var(--text-muted); letter-spacing: 0.06em; }

    .search-input:focus {
      border-color: var(--gold-dim);
      background: rgba(201,168,76,0.03);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.05);
    }

    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--border-gold); border: none;
      color: var(--text-muted); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: all 180ms var(--ease);
    }
    .search-clear.visible { display: flex; }
    .search-clear:hover { background: var(--gold-dim); color: var(--bg-base); }

    /* No results */
    .no-results {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 0; gap: 12px; text-align: center;
    }
    .no-results.show { display: flex; }
    .no-results-icon { font-size: 36px; opacity: 0.2; }
    .no-results h3 { font-size: 16px; font-weight: normal; color: var(--text-secondary); letter-spacing: 0.06em; }
    .no-results p { font-family: sans-serif; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }

    @media (max-width: 600px) {
      .header-inner { padding: 0 20px; }
      .header-brand h1 { font-size: 22px; }

      /* ── 手機版主容器 ── */
      .main { padding: 28px 20px 60px; }

      /* ── 手機版球員 Header ── */
      .player-avatar {
        width: 56px; height: 56px;
        flex-shrink: 0;
      }
      .player-avatar { width: 56px; height: 56px; }
      .player-header { gap: 14px; }
      .player-name-display { font-size: 15px; letter-spacing: 0.08em; }
      .player-team-display { font-size: 11px; letter-spacing: 0.14em; }
      .player-name-input   { font-size: 15px; letter-spacing: 0.08em; }
      .player-team-input   { font-size: 11px; letter-spacing: 0.14em; }

      /* ── 手機版卡片 Grid ── */
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px 12px;
      }
    }

    /* ── Sync dot ─────────────────────────────── */
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold-dim); transition: background 300ms; flex-shrink: 0;
    }
    .sync-dot.syncing { background: var(--gold-bright); animation: pulse 800ms infinite; }
    .sync-dot.ok      { background: #5A9E6F; }
    .sync-dot.error   { background: #9E5A5A; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ── Lock button ─────────────────────────── */
    .lock-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: transparent; border: 1px solid var(--border-gold);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 200ms var(--ease);
    }
    .lock-btn:hover { color: var(--gold-main); border-color: var(--gold-dim); background: rgba(201,168,76,0.06); }
    body.admin-mode .lock-btn { border-color: #5A9E6F; color: #5A9E6F; }
    body.admin-mode .lock-btn:hover { background: rgba(90,158,111,0.08); }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: var(--radius-sm);
      font-size: 12px; letter-spacing: 0.08em;
      font-family: var(--font-ui); font-weight: 600;
      cursor: pointer; border: none;
      transition: all 200ms var(--ease); white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-gold { background: var(--gold-main); color: #0A0904; }
    .btn-gold:hover:not(:disabled) { background: var(--gold-bright); box-shadow: 0 0 24px var(--shadow-gold); }

    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-gold); }
    .btn-ghost:hover:not(:disabled) { color: var(--gold-main); border-color: var(--gold-dim); background: rgba(201,168,76,0.05); }

    /* ── Admin mode visibility ───────────────────── */
    .card-overlay          { display: none; }
    .add-card-slot         { display: none; }
    .player-actions        { display: none; }
    #addPlayerBtn          { display: none; }
    .player-avatar         { pointer-events: none; cursor: default; }

    body.admin-mode .card-overlay      { display: flex; }
    body.admin-mode .add-card-slot     { display: flex; flex-direction: column; gap: 10px; }
    body.admin-mode .player-actions    { display: flex; }
    body.admin-mode #addPlayerBtn      { display: inline-flex; }
    body.admin-mode .player-avatar     { pointer-events: auto; cursor: pointer; }

    /* ── Main ────────────────────────────────────── */
    .main { max-width: 1440px; margin: 0 auto; padding: 36px 40px 80px; }

    /* ── Stats ───────────────────────────────────── */
    .stats {
      display: flex; align-items: flex-end; gap: 40px;
      margin-bottom: 48px; padding-bottom: 28px; border-bottom: 1px solid var(--border);
    }

    .stat-value { font-size: 36px; color: var(--gold-bright); letter-spacing: -0.03em; line-height: 1; font-weight: normal; font-family: var(--font-display); }
    .stat-label { font-family: var(--font-ui); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-top: 5px; }
    .stats-divider { width: 1px; height: 36px; background: var(--border-gold); }

    /* ── Player Section ──────────────────────────── */
    .player-section { margin-bottom: 100px; animation: rise 300ms var(--ease) both; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .player-header { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }

    /* ── Avatar ──────────────────────────────────── */
    .player-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      position: relative; flex-shrink: 0; overflow: hidden;
      border: 2px solid var(--gold-main);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15), 0 0 16px rgba(201, 168, 76, 0.2);
      transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
    }

    body.admin-mode .player-avatar:hover {
      border-color: var(--gold-main);
      box-shadow: 0 0 16px var(--shadow-gold);
    }

    .player-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .avatar-initials {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: sans-serif; font-size: 20px; font-weight: 600;
      color: var(--gold-dim); letter-spacing: 0.05em;
    }

    .avatar-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 180ms var(--ease);
    }

    body.admin-mode .player-avatar:hover .avatar-overlay { opacity: 1; }

    /* ── Player Info wrapper ─────────────────────── */
    .player-info {
      display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0;
    }

    /* ── Player Name — display (public) ─────────────── */
    .player-name-display {
      color: var(--gold-light);
      font-family: var(--font-ui); font-size: 18px;
      font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      line-height: 1.2; padding: 2px 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Player Team — display (public) ─────────────── */
    .player-team-display {
      color: var(--text-secondary);
      font-family: var(--font-ui); font-size: 13px;
      font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
      padding: 2px 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Player Name/Team — input (admin only) ───────── */
    .player-name-input,
    .player-team-input {
      display: none;
    }

    body.admin-mode .player-name-display,
    body.admin-mode .player-team-display { display: none; }

    body.admin-mode .player-name-input {
      display: block;
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid transparent;
      color: var(--gold-light);
      font-family: var(--font-ui); font-size: 18px;
      font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 2px 0; outline: none;
      transition: border-color 180ms var(--ease);
      caret-color: var(--gold-main);
    }

    body.admin-mode .player-name-input:focus { border-bottom-color: var(--gold-main); }
    body.admin-mode .player-name-input::placeholder { color: var(--text-muted); font-size: 16px; }

    body.admin-mode .player-team-input {
      display: block;
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui); font-size: 13px;
      font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
      padding: 2px 0; outline: none;
      transition: border-color 180ms var(--ease);
      caret-color: var(--gold-main);
    }

    body.admin-mode .player-team-input:focus { border-bottom-color: var(--border-gold); }
    body.admin-mode .player-team-input::placeholder { color: var(--text-muted); font-size: 13px; }

    /* ── Player Actions ──────────────────────────── */
    .player-actions { gap: 8px; margin-left: auto; }

    .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: transparent; border: 1px solid var(--border-gold);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 180ms var(--ease);
    }

    .icon-btn:hover { color: var(--gold-main); border-color: var(--gold-dim); background: rgba(201,168,76,0.06); }
    .icon-btn.danger:hover { color: #C05050; border-color: #803030; background: rgba(180,60,60,0.08); }

    /* ── Divider ──────────────────────────────────── */
    .player-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent 100%);
      opacity: 0.6;
      margin-bottom: 24px;
    }

    /* ── Drag & Drop ─────────────────────────────── */
    .drag-handle {
      display: none;
      width: 28px; height: 28px;
      align-items: center; justify-content: center;
      color: var(--text-muted); cursor: grab;
      border-radius: var(--radius-sm);
      transition: color 180ms var(--ease), background 180ms var(--ease);
      flex-shrink: 0; margin-right: 4px;
    }
    body.admin-mode .drag-handle { display: flex; }
    .drag-handle:hover { color: var(--gold-dim); background: rgba(201,168,76,0.06); }
    .drag-handle:active { cursor: grabbing; }

    .player-section.is-dragging {
      opacity: 0.3;
      transform: scale(0.985);
      transition: opacity 150ms, transform 150ms;
    }
    .player-section.drag-over {
      outline: 2px dashed var(--gold-dim);
      outline-offset: 10px;
      border-radius: var(--radius-md);
    }

    /* ── Card Grid ───────────────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 28px 24px; }

    /* ── Card Item ───────────────────────────────── */
    .card-item { display: flex; flex-direction: column; gap: 10px; }

    /* ── Card Slot ───────────────────────────────── */
    .card-slot {
      width: 100%; aspect-ratio: 380 / 639;
      position: relative; border-radius: var(--radius-lg);
      overflow: hidden; background: var(--bg-card);
      border: 1px solid var(--border-gold);
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease), border-color 220ms var(--ease);
      box-shadow: 0 2px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.08);
    }

    body.admin-mode .card-slot { cursor: pointer; }

    body.admin-mode .card-slot:hover {
      transform: translateY(-3px); border-color: var(--gold-dim);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--gold-subtle), inset 0 1px 0 rgba(201,168,76,0.15);
    }

    .card-slot img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; user-select: none; }
    .card-slot.uploading { pointer-events: none; opacity: 0.6; }

    .slot-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; pointer-events: none;
    }

    .slot-empty-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--gold-subtle); border: 1px solid var(--border-gold);
      display: flex; align-items: center; justify-content: center;
    }

    .slot-empty p { font-family: var(--font-ui); font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

    .psa-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(10,9,4,0.85); border: 1px solid var(--border-gold);
      border-radius: 4px; padding: 3px 7px;
      font-family: var(--font-ui); font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      color: var(--gold-dim); text-transform: uppercase; pointer-events: none;
    }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.1) 100%);
      align-items: flex-end; justify-content: center;
      gap: 10px; padding-bottom: 16px;
      opacity: 0; transition: opacity 200ms var(--ease);
    }

    body.admin-mode .card-slot:hover .card-overlay { opacity: 1; }

    .ov-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.4);
      background: rgba(10,9,4,0.7); color: var(--gold-main);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 180ms var(--ease); backdrop-filter: blur(4px);
    }

    .ov-btn:hover { background: var(--gold-main); color: #0A0904; border-color: var(--gold-main); transform: scale(1.1); }
    .ov-btn.danger:hover { background: #B03030; border-color: #B03030; color: #fff; }

    input[type="file"] { display: none; }

    /* ── Add Card Slot ────────────────────────────── */
    .add-card-slot { flex-direction: column; gap: 10px; }

    .add-btn-area {
      width: 100%; aspect-ratio: 380 / 639;
      background: transparent; border: 2px dashed var(--border-gold);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: all 200ms var(--ease); color: var(--text-muted);
    }

    .add-btn-area:hover { border-color: var(--gold-dim); color: var(--gold-main); background: rgba(201,168,76,0.03); }

    .add-btn-area .add-icon {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px dashed currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 300; line-height: 1;
      transition: transform 200ms var(--ease);
    }

    .add-btn-area:hover .add-icon { transform: scale(1.1) rotate(90deg); }
    .add-btn-area p { font-family: var(--font-ui); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; }
    .add-name-spacer { height: 27px; }

    /* ── Modals ──────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 220ms var(--ease);
    }

    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: 36px 32px; width: 360px; max-width: 90vw;
      display: flex; flex-direction: column; gap: 24px;
      transform: translateY(20px);
      transition: transform 220ms var(--ease);
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }

    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-title {
      font-size: 13px; font-weight: 600;
      font-family: var(--font-ui);
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold-main); text-align: center;
    }

    .modal-avatar-area { display: flex; justify-content: center; }

    .modal-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      border: 2px dashed var(--border-gold); background: var(--bg-card);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer;
      transition: all 200ms var(--ease);
      position: relative; overflow: hidden; color: var(--text-muted);
    }

    .modal-avatar:hover { border-color: var(--gold-main); color: var(--gold-main); }
    .modal-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .modal-avatar p { font-family: sans-serif; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; position: relative; z-index: 1; }

    .modal-avatar-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; opacity: 0; transition: opacity 180ms var(--ease); color: var(--gold-main);
    }

    .modal-avatar:hover .modal-avatar-overlay { opacity: 1; }
    .modal-avatar-overlay p { font-family: sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }

    .modal-input {
      width: 100%; background: var(--bg-card);
      border: 1px solid var(--border-gold); border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-ui); font-size: 13px;
      font-weight: 500; letter-spacing: 0.06em; padding: 12px 14px; outline: none;
      transition: border-color 180ms var(--ease); caret-color: var(--gold-main);
    }

    .modal-input::placeholder { color: var(--text-muted); }
    .modal-input:focus { border-color: var(--gold-main); }

    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    .admin-modal { width: 300px; }

    .admin-modal .modal-input {
      text-align: center; font-size: 22px;
      letter-spacing: 0.3em; padding: 14px;
    }

    .admin-error {
      font-family: var(--font-ui); font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; color: #C05050;
      text-align: center;
      opacity: 0; transition: opacity 200ms; margin-top: -12px;
    }

    .admin-error.show { opacity: 1; }

    /* ── Loading screen ───────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg-base);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      transition: opacity 400ms var(--ease);
    }

    .loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 40px; height: 40px;
      border: 2px solid var(--border-gold); border-top-color: var(--gold-main);
      border-radius: 50%; animation: spin 800ms linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen p { font-family: var(--font-ui); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }

    /* ── Empty state ─────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 100px 0; gap: 16px; text-align: center;
    }

    .empty-state-icon { font-size: 48px; opacity: 0.2; margin-bottom: 8px; }
    .empty-state h2 { font-size: 18px; color: var(--text-secondary); font-weight: 400; font-family: var(--font-display); letter-spacing: 0.06em; }
    .empty-state p { font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.08em; }
    .empty-gold-line { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }

    /* ── Lightbox ────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 260ms var(--ease);
      cursor: zoom-out;
    }

    .lightbox.show { opacity: 1; pointer-events: all; }

    .lightbox-img {
      max-width: min(500px, 90vw);
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 32px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.15);
      transform: scale(0.94);
      transition: transform 260ms var(--ease);
      cursor: default;
    }

    .lightbox.show .lightbox-img { transform: scale(1); }

    .lightbox-close {
      position: absolute; top: 24px; right: 28px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 180ms var(--ease);
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.18); color: #fff; }

    .lightbox-caption {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-ui); font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(201,168,76,0.5);
      white-space: nowrap;
    }

    body:not(.admin-mode) .card-slot.has-image { cursor: zoom-in; }

    /* ── Toast ────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--bg-surface); border: 1px solid var(--border-gold);
      color: var(--text-primary); padding: 11px 20px;
      border-radius: var(--radius-sm); font-family: var(--font-ui);
      font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      pointer-events: none; z-index: 998;
      opacity: 0; transform: translateY(12px);
      transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-ring"></div>
  <p>連線中</p>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">

    <!-- Top: nav + controls -->
    <div class="header-nav-row">
      <a class="nav-back" href="../index.html">← 返回首頁</a>
      <span class="nav-brand">Arish <span>Collection</span></span>
      <div class="header-actions">
        <div class="sync-dot" id="syncDot"></div>
        <button class="btn btn-gold" id="addPlayerBtn" onclick="showAddPlayerModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新增球星
        </button>
        <button class="lock-btn" id="lockBtn" onclick="toggleAdmin()" title="管理員登入">
          <svg id="lockIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Brand -->
    <div class="header-brand-row">
      <div class="header-brand">
        <h1>NBA 球員卡收藏</h1>
      </div>
    </div>

    <!-- Search -->
    <div class="header-search-row">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="search-input" id="searchInput" type="text"
          placeholder="搜尋球員姓名..."
          oninput="searchPlayers(this.value)">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="no-results" id="noResults">
    <div class="no-results-icon">🏀</div>
    <h3>找不到符合的球員</h3>
    <p>試試其他關鍵字</p>
  </div>
  <div id="playerList"></div>
</main>

<!-- Admin Login Modal -->
<div class="modal-overlay" id="adminModalOverlay" onclick="onAdminOverlayClick(event)">
  <div class="modal admin-modal">
    <div class="modal-title">管理員登入</div>
    <input type="password" class="modal-input" id="adminPwInput"
      placeholder="••••••••"
      onkeydown="if(event.key==='Enter') submitAdminLogin()">
    <div class="admin-error" id="adminError">密碼錯誤，請再試一次</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideAdminModal()">取消</button>
      <button class="btn btn-gold" onclick="submitAdminLogin()">登入</button>
    </div>
  </div>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="onPlayerOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">新增球星</div>

    <div class="modal-avatar-area">
      <div class="modal-avatar" onclick="document.getElementById('modalPhotoInput').click()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="modalAvatarIcon">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <p id="modalAvatarHint">上傳照片</p>
        <img id="modalAvatarPreview" style="display:none;">
        <div class="modal-avatar-overlay">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <p>更換</p>
        </div>
        <input type="file" id="modalPhotoInput" accept="image/*" onchange="previewModalPhoto(event)">
      </div>
    </div>

    <input type="text" class="modal-input" id="modalNameInput"
      placeholder="球員姓名（例如 CADE CUNNINGHAM）"
      style="text-transform:uppercase;">

    <input type="text" class="modal-input" id="modalTeamInput"
      placeholder="所屬球隊（例如 DETROIT PISTONS）"
      style="text-transform:uppercase; margin-top:10px;">

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideAddPlayerModal()">取消</button>
      <button class="btn btn-gold" id="modalSaveBtn" onclick="submitAddPlayer()">新增</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://uguxzseangntmddvgzpl.supabase.co',
    'sb_publishable_JyqJ4lUj-vnh3USGWiciYw_G07vLNcP'
  );

  const ADMIN_PW = '88888888';
  let players = [];
  let modalPhotoFile = null;

  function setSyncStatus(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }

  function hideLoading() {
    const el = document.getElementById('loadingScreen');
    el.classList.add('hidden');
    setTimeout(() => el.remove(), 500);
  }

  async function init() {
    setSyncStatus('syncing');
    const [{ data: ps, error: pe }, { data: cs, error: ce }] = await Promise.all([
      db.from('players').select('*').order('created_at'),
      db.from('cards').select('*').order('created_at')
    ]);

    if (pe || ce) { setSyncStatus('error'); toast('無法連線，請重新整理'); hideLoading(); return; }

    const cards = cs || [];
    players = (ps || []).map(p => ({ ...p, cards: cards.filter(c => c.player_id === p.id) }));
    applyPlayerOrder();

    setSyncStatus('ok');
    hideLoading();
    render();
  }

  function toggleAdmin() {
    if (document.body.classList.contains('admin-mode')) {
      document.body.classList.remove('admin-mode');
      sessionStorage.removeItem('admin_ok');
      updateLockIcon(false);
      toast('已退出管理員模式');
    } else {
      showAdminModal();
    }
  }

  function showAdminModal() {
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminError').classList.remove('show');
    document.getElementById('adminModalOverlay').classList.add('show');
    setTimeout(() => document.getElementById('adminPwInput').focus(), 200);
  }

  function hideAdminModal() { document.getElementById('adminModalOverlay').classList.remove('show'); }
  function onAdminOverlayClick(e) { if (e.target === document.getElementById('adminModalOverlay')) hideAdminModal(); }

  function submitAdminLogin() {
    const val = document.getElementById('adminPwInput').value;
    if (val === ADMIN_PW) {
      document.body.classList.add('admin-mode');
      sessionStorage.setItem('admin_ok', '1');
      updateLockIcon(true);
      hideAdminModal();
      toast('已進入管理員模式');
    } else {
      document.getElementById('adminError').classList.add('show');
      document.getElementById('adminPwInput').value = '';
      document.getElementById('adminPwInput').focus();
      setTimeout(() => document.getElementById('adminError').classList.remove('show'), 2500);
    }
  }

  function updateLockIcon(isAdmin) {
    document.getElementById('lockIcon').innerHTML = isAdmin
      ? `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
         <path d="M7 11V7a5 5 0 0 1 9.9-1"/>`
      : `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
         <path d="M7 11V7a5 5 0 0 1 10 0v4"/>`;
  }

  if (sessionStorage.getItem('admin_ok') === '1') {
    document.body.classList.add('admin-mode');
    updateLockIcon(true);
  }

  function showAddPlayerModal() {
    modalPhotoFile = null;
    document.getElementById('modalNameInput').value = '';
    document.getElementById('modalTeamInput').value = '';
    document.getElementById('modalAvatarPreview').style.display = 'none';
    document.getElementById('modalAvatarIcon').style.display = 'block';
    document.getElementById('modalAvatarHint').style.display = 'block';
    document.getElementById('modalPhotoInput').value = '';
    document.getElementById('modalOverlay').classList.add('show');
    setTimeout(() => document.getElementById('modalNameInput').focus(), 200);
  }

  function hideAddPlayerModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  function onPlayerOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) hideAddPlayerModal(); }

  function previewModalPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    modalPhotoFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('modalAvatarPreview');
      img.src = ev.target.result; img.style.display = 'block';
      document.getElementById('modalAvatarIcon').style.display = 'none';
      document.getElementById('modalAvatarHint').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function submitAddPlayer() {
    const name = document.getElementById('modalNameInput').value.trim();
    if (!name) { document.getElementById('modalNameInput').focus(); return; }

    document.getElementById('modalSaveBtn').disabled = true;
    setSyncStatus('syncing');

    const team = (document.getElementById('modalTeamInput').value.trim()).toUpperCase();
    const { data: player, error } = await db.from('players')
      .insert({ name: name.toUpperCase(), team: team || null }).select().single();

    if (error) { setSyncStatus('error'); toast('新增失敗'); document.getElementById('modalSaveBtn').disabled = false; return; }

    if (modalPhotoFile) {
      const ext  = modalPhotoFile.name.split('.').pop();
      const path = `players/${player.id}/profile.${ext}`;
      const { error: uploadErr } = await db.storage.from('card-images').upload(path, modalPhotoFile);
      if (!uploadErr) {
        const { data: { publicUrl } } = db.storage.from('card-images').getPublicUrl(path);
        await db.from('players').update({ profile_image_url: publicUrl }).eq('id', player.id);
        player.profile_image_url = publicUrl;
      }
    }

    players.push({ ...player, cards: [] });
    document.getElementById('modalSaveBtn').disabled = false;
    setSyncStatus('ok');
    hideAddPlayerModal();
    render();
    toast(`已新增 ${player.name}`);
  }

  async function setPlayerName(id, val) {
    const name = val.trim().toUpperCase();
    setSyncStatus('syncing');
    const { error } = await db.from('players').update({ name }).eq('id', id);
    if (error) { setSyncStatus('error'); toast('儲存失敗'); return; }
    const p = players.find(p => p.id === id);
    if (p) {
      p.name = name;
      const sec = document.querySelector(`.player-section[data-player-id="${id}"]`);
      if (sec) { const d = sec.querySelector('.player-name-display'); if (d) d.textContent = name; }
    }
    setSyncStatus('ok');
  }

  async function setPlayerTeam(id, val) {
    const team = val.trim().toUpperCase();
    setSyncStatus('syncing');
    const { error } = await db.from('players').update({ team: team || null }).eq('id', id);
    if (error) { setSyncStatus('error'); toast('儲存失敗'); return; }
    const p = players.find(p => p.id === id);
    if (p) {
      p.team = team;
      const sec = document.querySelector(`.player-section[data-player-id="${id}"]`);
      if (sec) { const d = sec.querySelector('.player-team-display'); if (d) d.textContent = team; }
    }
    setSyncStatus('ok');
  }

  function pickPlayerPhoto(id) { document.getElementById(`pf-${id}`).click(); }

  async function uploadPlayerPhoto(id, e) {
    const file = e.target.files[0]; if (!file) return;
    setSyncStatus('syncing');
    const p = players.find(p => p.id === id);
    if (p?.profile_image_url) {
      const old = extractPath(p.profile_image_url);
      if (old) await db.storage.from('card-images').remove([old]);
    }
    const ext  = file.name.split('.').pop();
    const path = `players/${id}/profile.${ext}`;
    const { error: uploadErr } = await db.storage.from('card-images').upload(path, file, { upsert: true });
    if (uploadErr) { setSyncStatus('error'); toast('上傳失敗'); return; }
    const { data: { publicUrl } } = db.storage.from('card-images').getPublicUrl(path);
    await db.from('players').update({ profile_image_url: publicUrl }).eq('id', id);
    if (p) p.profile_image_url = publicUrl;
    setSyncStatus('ok');
    render();
    toast('頭像已更新');
    e.target.value = '';
  }

  async function deletePlayer(id) {
    if (!confirm('確定要刪除這位球星及所有卡片嗎？')) return;
    setSyncStatus('syncing');
    const p = players.find(p => p.id === id);
    const paths = [];
    if (p?.profile_image_url) { const pt = extractPath(p.profile_image_url); if (pt) paths.push(pt); }
    p?.cards.forEach(c => { if (c.image_url) { const pt = extractPath(c.image_url); if (pt) paths.push(pt); } });
    if (paths.length) await db.storage.from('card-images').remove(paths);
    const { error } = await db.from('players').delete().eq('id', id);
    if (error) { setSyncStatus('error'); toast('刪除失敗'); return; }
    players = players.filter(p => p.id !== id);
    setSyncStatus('ok');
    render();
    toast('球星已移除');
  }

  async function addCard(playerId) {
    setSyncStatus('syncing');
    const { data, error } = await db.from('cards')
      .insert({ player_id: playerId, image_url: null }).select().single();
    if (error) { setSyncStatus('error'); toast('新增失敗'); return; }
    const p = players.find(p => p.id === playerId);
    if (p) p.cards.push(data);
    setSyncStatus('ok');
    render();
  }

  async function deleteCard(playerId, cardId) {
    setSyncStatus('syncing');
    const p = players.find(p => p.id === playerId);
    const c = p?.cards.find(c => c.id === cardId);
    if (c?.image_url) { const pt = extractPath(c.image_url); if (pt) await db.storage.from('card-images').remove([pt]); }
    const { error } = await db.from('cards').delete().eq('id', cardId);
    if (error) { setSyncStatus('error'); toast('刪除失敗'); return; }
    if (p) p.cards = p.cards.filter(c => c.id !== cardId);
    setSyncStatus('ok');
    render();
    toast('卡片已移除');
  }

  function pickCardImage(cardId) { document.getElementById(`cf-${cardId}`).click(); }

  async function uploadCardImage(playerId, cardId, e) {
    const file = e.target.files[0]; if (!file) return;
    const slot = document.getElementById(`cs-${cardId}`);
    if (slot) slot.classList.add('uploading');
    setSyncStatus('syncing');
    const p = players.find(p => p.id === playerId);
    const c = p?.cards.find(c => c.id === cardId);
    if (c?.image_url) { const pt = extractPath(c.image_url); if (pt) await db.storage.from('card-images').remove([pt]); }
    const ext  = file.name.split('.').pop();
    const path = `cards/${cardId}/${Date.now()}.${ext}`;
    const { error: uploadErr } = await db.storage.from('card-images').upload(path, file);
    if (uploadErr) { if (slot) slot.classList.remove('uploading'); setSyncStatus('error'); toast('上傳失敗'); return; }
    const { data: { publicUrl } } = db.storage.from('card-images').getPublicUrl(path);
    await db.from('cards').update({ image_url: publicUrl }).eq('id', cardId);
    if (c) c.image_url = publicUrl;
    if (slot) slot.classList.remove('uploading');
    setSyncStatus('ok');
    render();
    toast('圖片已上傳並同步至雲端');
    e.target.value = '';
  }

  async function removeCardImage(playerId, cardId) {
    const p = players.find(p => p.id === playerId);
    const c = p?.cards.find(c => c.id === cardId);
    if (!c?.image_url) return;
    setSyncStatus('syncing');
    const pt = extractPath(c.image_url);
    if (pt) await db.storage.from('card-images').remove([pt]);
    await db.from('cards').update({ image_url: null }).eq('id', cardId);
    c.image_url = null;
    setSyncStatus('ok');
    render();
  }

  function onCardClick(cardId, playerId) {
    if (document.body.classList.contains('admin-mode')) {
      pickCardImage(cardId);
    } else {
      const p = players.find(p => p.id === playerId);
      const c = p?.cards.find(c => c.id === cardId);
      if (c?.image_url) openLightbox(c.image_url, p?.name || '');
    }
  }

  function openLightbox(url, playerName) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightboxCaption').textContent = playerName;
    document.getElementById('lightbox').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function extractPath(url) { const m = url.match(/\/object\/public\/card-images\/(.+)/); return m ? m[1] : null; }
  function getInitials(name) { return (name||'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join(''); }

  function updateStats() {
    // stats reserved for future use
  }

  /* ── Search ──────────────────────────────────── */
  function searchPlayers(query) {
    const q = query.trim().toLowerCase();
    const sections = document.querySelectorAll('.player-section');
    let visibleCount = 0;

    sections.forEach(sec => {
      const nameEl = sec.querySelector('.player-name-display') || sec.querySelector('.player-name-input');
      const name = (nameEl?.textContent || nameEl?.value || '').toLowerCase();
      const match = !q || name.includes(q);
      sec.style.display = match ? '' : 'none';
      if (match) visibleCount++;
    });

    // clear button visibility
    document.getElementById('searchClear').classList.toggle('visible', q.length > 0);

    // no results state
    document.getElementById('noResults').classList.toggle('show', q.length > 0 && visibleCount === 0);
  }

  function clearSearch() {
    const input = document.getElementById('searchInput');
    input.value = '';
    searchPlayers('');
    input.focus();
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function render() {
    const list = document.getElementById('playerList');
    list.innerHTML = '';

    if (!players.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏀</div>
          <div class="empty-gold-line"></div>
          <h2>尚未新增任何球星</h2>
          <p>點擊右上角鎖頭圖示登入管理員模式開始新增</p>
        </div>`;
      updateStats(); return;
    }

    players.forEach(p => {
      const section = document.createElement('div');
      section.className = 'player-section';
      section.dataset.playerId = p.id;

      const avatarInner = p.profile_image_url
        ? `<img src="${p.profile_image_url}" alt="${p.name}">`
        : `<div class="avatar-initials">${getInitials(p.name)}</div>`;

      const cardsHtml = p.cards.map(c => `
        <div class="card-item">
          <div class="card-slot ${c.image_url ? 'has-image' : ''}" id="cs-${c.id}" onclick="onCardClick('${c.id}','${p.id}')">
            ${c.image_url
              ? `<img src="${c.image_url}" alt="PSA Card" draggable="false">`
              : `<div class="slot-empty">
                  <div class="slot-empty-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5">
                      <rect x="3" y="3" width="18" height="18" rx="2"/>
                      <circle cx="8.5" cy="8.5" r="1.5"/>
                      <polyline points="21 15 16 10 5 21"/>
                    </svg>
                  </div>
                  <p>點擊上傳圖片</p>
                </div>`
            }
            <div class="psa-badge">PSA</div>
            <div class="card-overlay">
              <button class="ov-btn" onclick="event.stopPropagation(); pickCardImage('${c.id}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              ${c.image_url ? `
              <button class="ov-btn" onclick="event.stopPropagation(); removeCardImage('${p.id}','${c.id}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>` : ''}
              <button class="ov-btn danger" onclick="event.stopPropagation(); deleteCard('${p.id}','${c.id}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </div>
            <input type="file" id="cf-${c.id}" accept="image/*" onchange="uploadCardImage('${p.id}','${c.id}',event)">
          </div>
        </div>
      `).join('');

      section.innerHTML = `
        <div class="player-header">
          <div class="drag-handle" title="拖曳排序">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <circle cx="4" cy="2" r="1.2"/><circle cx="4" cy="7" r="1.2"/><circle cx="4" cy="12" r="1.2"/>
              <circle cx="10" cy="2" r="1.2"/><circle cx="10" cy="7" r="1.2"/><circle cx="10" cy="12" r="1.2"/>
            </svg>
          </div>
          <div class="player-avatar" onclick="pickPlayerPhoto('${p.id}')">
            ${avatarInner}
            <div class="avatar-overlay">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </div>
            <input type="file" id="pf-${p.id}" accept="image/*" onchange="uploadPlayerPhoto('${p.id}',event)">
          </div>

          <div class="player-info">
            <div class="player-name-display">${(p.name||'').replace(/</g,'&lt;')}</div>
            <div class="player-team-display">${(p.team||'').replace(/</g,'&lt;')}</div>
            <input class="player-name-input" type="text"
              value="${(p.name||'').replace(/"/g,'&quot;')}"
              placeholder="球員姓名"
              onchange="setPlayerName('${p.id}', this.value)"
              onclick="event.stopPropagation()">
            <input class="player-team-input" type="text"
              value="${(p.team||'').replace(/"/g,'&quot;')}"
              placeholder="所屬球隊"
              onchange="setPlayerTeam('${p.id}', this.value)"
              onclick="event.stopPropagation()">
          </div>

          <div class="player-actions">
            <button class="icon-btn danger" onclick="deletePlayer('${p.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="player-divider"></div>

        <div class="card-grid">
          ${cardsHtml}
          <div class="add-card-slot">
            <div class="add-btn-area" onclick="addCard('${p.id}')">
              <div class="add-icon">+</div>
              <p>新增卡片</p>
            </div>
            <div class="add-name-spacer"></div>
          </div>
        </div>
      `;

      list.appendChild(section);
    });

    updateStats();
    initDragDrop();
  }

  function savePlayerOrder() {
    localStorage.setItem('player_order', JSON.stringify(players.map(p => p.id)));
  }

  function applyPlayerOrder() {
    const saved = localStorage.getItem('player_order');
    if (!saved) return;
    try {
      const order = JSON.parse(saved);
      players.sort((a, b) => {
        const ai = order.indexOf(a.id);
        const bi = order.indexOf(b.id);
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    } catch (_) {}
  }

  function initDragDrop() {
    if (!document.body.classList.contains('admin-mode')) return;

    let dragSrc = null;
    let dragAllowed = false;

    document.querySelectorAll('.player-section').forEach(sec => {
      const handle = sec.querySelector('.drag-handle');
      if (!handle) return;

      handle.addEventListener('mousedown', () => { dragAllowed = true; });
      handle.addEventListener('touchstart', () => { dragAllowed = true; }, { passive: true });

      sec.setAttribute('draggable', 'true');

      sec.addEventListener('dragstart', e => {
        if (!dragAllowed) { e.preventDefault(); return; }
        dragSrc = sec;
        dragAllowed = false;
        setTimeout(() => sec.classList.add('is-dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', sec.dataset.playerId);
      });

      sec.addEventListener('dragend', () => {
        dragAllowed = false;
        sec.classList.remove('is-dragging');
        document.querySelectorAll('.player-section').forEach(s => s.classList.remove('drag-over'));
        dragSrc = null;
      });

      sec.addEventListener('dragover', e => {
        if (!dragSrc || dragSrc === sec) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.player-section').forEach(s => s.classList.remove('drag-over'));
        sec.classList.add('drag-over');
      });

      sec.addEventListener('dragleave', e => {
        if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over');
      });

      sec.addEventListener('drop', e => {
        e.preventDefault();
        sec.classList.remove('drag-over');
        if (!dragSrc || dragSrc === sec) return;

        const srcId = dragSrc.dataset.playerId;
        const dstId = sec.dataset.playerId;
        const srcIdx = players.findIndex(p => p.id === srcId);
        const dstIdx = players.findIndex(p => p.id === dstId);
        if (srcIdx === -1 || dstIdx === -1) return;

        const [moved] = players.splice(srcIdx, 1);
        players.splice(dstIdx, 0, moved);

        savePlayerOrder();
        render();
        toast('排序已更新');
      });
    });
  }

  init();
</script>
</body>
</html>
