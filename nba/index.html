<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA 球員卡收藏 | Arish Collection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --bg-card:   #0d0d1e;
      --border:    #1e1e3a;
      --text:      #d8d8ea;
      --text-dim:  #5a5a7a;
      --text-muted:#9090b0;
      --nba:       #e87722;
      --nba-light: #ffaa55;
      --nba-glow:  rgba(232, 119, 34, 0.35);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,15,0.8);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .nav-back:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,0.04);
    }
    .nav-brand {
      margin-left: 16px;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .nav-brand span { color: var(--nba); }

    /* ── Page ── */
    .page {
      min-height: calc(100vh - 53px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(232,119,34,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Content ── */
    .content {
      text-align: center;
      max-width: 480px;
      animation: fadeUp 0.7s ease both;
    }

    .icon {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 32px;
      display: block;
      filter: drop-shadow(0 0 24px var(--nba-glow));
      animation: float 4s ease-in-out infinite;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--nba);
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 16px;
      text-shadow: 0 0 40px rgba(232,119,34,0.2);
    }

    .desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Coming soon badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid var(--nba);
      color: var(--nba);
      background: rgba(232,119,34,0.07);
      margin-bottom: 48px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--nba);
      animation: pulse 2s infinite;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--nba), transparent);
      margin: 0 auto 40px;
    }

    /* Preview tags */
    .preview-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 0;
    }
    .tag {
      font-size: 0.72rem;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .tag.highlight {
      border-color: rgba(232,119,34,0.4);
      color: var(--nba-light);
      background: rgba(232,119,34,0.06);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.7rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
  <a class="nav-back" href="../index.html">
    <span>←</span>
    返回首頁
  </a>
  <span class="nav-brand">Arish <span>Collection</span></span>
</nav>

<main class="page">
  <div class="content">
    <span class="icon">🏀</span>
    <p class="label">NBA Trading Cards</p>
    <h1>球員卡收藏<br>即將登場</h1>
    <p class="desc">
      球星簽名卡、RC 新人卡、限量短印⋯⋯<br>
      NBA 球員卡收藏展示頁面正在建置中，敬請期待。
    </p>

    <div class="badge">
      <span class="badge-dot"></span>
      COMING SOON
    </div>

    <div class="divider"></div>

    <div class="preview-tags">
      <span class="tag highlight">簽名卡</span>
      <span class="tag highlight">RC 新人卡</span>
      <span class="tag highlight">限量短印</span>
      <span class="tag">Prizm</span>
      <span class="tag">Select</span>
      <span class="tag">Mosaic</span>
      <span class="tag">Optic</span>
      <span class="tag">National Treasures</span>
    </div>
  </div>
</main>

<footer>
  © Arish Collection · 個人收藏展示，非商業用途
</footer>

</body>
</html>
